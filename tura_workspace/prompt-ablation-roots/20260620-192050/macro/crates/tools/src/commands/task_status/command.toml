id = "task_status"
name = "Task Status"
description = "Update task lifecycle state inside command_run."
core = true
category = "runtime"
execution = "in_process"
state_machine = "default_command"
supports_macro_command = false
mutating = false
network = false

[runtime]
binary = ""
entry = "crate::commands::task_status"
language = "rust"

[limits]
default_timeout_ms = 5000
max_timeout_ms = 30000

[paths]
prompt = "prompt.md"
schema = "schema.json"
policy = "policy.toml"

[builder_config]
raw = {}
