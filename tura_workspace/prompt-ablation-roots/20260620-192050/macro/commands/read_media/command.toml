id = "read_media"
name = "Read Media"
description = "Inspect local media and documents."
core = false
category = "media"
execution = "one_shot"
state_machine = "default_command"
supports_macro_command = true
mutating = false
network = false

[runtime]
binary = "tura-command-read-media"
entry = ""
language = "rust"

[limits]
default_timeout_ms = 60000
max_timeout_ms = 300000

[paths]
prompt = "prompt.md"
schema = "schema.json"
policy = "policy.toml"

[[configurable]]
key = "pdf_default_pages"
label = "PDF Pages"
description = "Default number of PDF pages to inspect."
type = "enum"
default = "5"
enum = ["1", "3", "5", "10"]
required = false
scope = "workspace"

[builder_config]
raw = {}
