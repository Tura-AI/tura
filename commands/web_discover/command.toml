id = "web_discover"
name = "Web Discover"
description = "Find public website text and public media artifacts."
core = false
category = "network"
execution = "one_shot"
state_machine = "default_command"
supports_macro_command = true
mutating = false
network = true

[runtime]
binary = "tura-command-web-discover"
entry = ""
language = "rust"

[limits]
default_timeout_ms = 60000
max_timeout_ms = 300000

[paths]
prompt = "prompt.md"
schema = "schema.json"
policy = "policy.toml"

[[configurable]]
key = "search_route"
label = "Search Route"
description = "Preferred web search route."
type = "enum"
default = "auto"
enum = ["auto", "duckduckgo", "brave", "exa"]
required = false
scope = "workspace"

[[configurable]]
key = "download_directory"
label = "Download Directory"
description = "Optional workspace-relative download directory."
type = "string"
default = ""
required = false
scope = "workspace"

[builder_config]
raw = {}
