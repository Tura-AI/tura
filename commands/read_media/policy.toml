model_visible = false
read_only = true
workspace_write = false

[configurable]
media_compression = { default = "balanced", enum = ["compact", "balanced", "detailed"] }
pdf_default_pages = { default = "standard", enum = ["first", "standard", "extended"] }
directory_default_files = { default = "standard", enum = ["few", "standard", "many"] }
document_attachment_size = { default = "standard", enum = ["small", "standard", "large"] }
audio_preview_size = { default = "standard", enum = ["small", "standard", "large"] }
