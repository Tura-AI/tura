id = "image_generate"
name = "Image Generate"
description = "Generate or edit images through configured provider fallback routes."
core = false
category = "network"
execution = "one_shot"
state_machine = "default_command"
supports_macro_command = false
mutating = true
network = true

[runtime]
binary = "tura-command-image-generate"
entry = ""
language = "rust"

[limits]
default_timeout_ms = 100000
max_timeout_ms = 600000

[paths]
prompt = "prompt.md"
schema = "schema.json"
policy = "policy.toml"

[[configurable]]
key = "provider_order"
label = "Provider Order"
description = "Default provider fallback order. Can also be overridden with TURA_IMAGE_GENERATE_PROVIDER_ORDER."
type = "enum"
default = "replicate_z_image_turbo,chatgpt_image_2,gemini_3_1_flash,grok3"
enum = [
  "replicate_z_image_turbo,chatgpt_image_2,gemini_3_1_flash,grok3",
  "chatgpt_image_2,replicate_z_image_turbo,gemini_3_1_flash,grok3",
  "gemini_3_1_flash,chatgpt_image_2,replicate_z_image_turbo,grok3",
  "grok3,chatgpt_image_2,replicate_z_image_turbo,gemini_3_1_flash",
]
required = false
scope = "workspace"

[[configurable]]
key = "output_directory"
label = "Output Directory"
description = "Default workspace-relative directory for generated images."
type = "string"
default = "media/image"
required = false
scope = "workspace"

[builder_config]
raw = {}
