id = "generate_media"
name = "Generate Media"
description = "Generate images or speech audio through configured internal provider fallback routes."
core = false
category = "network"
execution = "one_shot"
state_machine = "default_command"
supports_macro_command = false
mutating = true
network = true

[runtime]
binary = "tura-command-generate-media"
entry = ""
language = "rust"

[limits]
default_timeout_ms = 100000
max_timeout_ms = 600000

[paths]
prompt = "prompt.md"
schema = "schema.json"
policy = "policy.toml"

[[configurable]]
key = "provider_order"
label = "Provider Order"
description = "Default image provider fallback order. Can also be overridden with TURA_GENERATE_MEDIA_PROVIDER_ORDER."
type = "enum"
default = "replicate_z_image_turbo,chatgpt_image_2,gemini_3_1_flash,grok3"
enum = [
  "replicate_z_image_turbo,chatgpt_image_2,gemini_3_1_flash,grok3",
  "chatgpt_image_2,replicate_z_image_turbo,gemini_3_1_flash,grok3",
  "gemini_3_1_flash,chatgpt_image_2,replicate_z_image_turbo,grok3",
  "grok3,chatgpt_image_2,replicate_z_image_turbo,gemini_3_1_flash",
]
required = false
scope = "workspace"

[[configurable]]
key = "speech_provider_order"
label = "Speech Provider Order"
description = "Default speech provider fallback order. Can also be overridden with TURA_GENERATE_MEDIA_SPEECH_PROVIDER_ORDER."
type = "enum"
default = "qwen_dashscope,azure_edge_tts,replicate_qwen3_tts,azure_speech,openai_tts,elevenlabs,replicate_chatterbox"
enum = [
  "qwen_dashscope,openai_tts,elevenlabs,azure_speech,azure_edge_tts,replicate_qwen3_tts,replicate_chatterbox",
  "qwen_dashscope,azure_edge_tts,replicate_qwen3_tts,azure_speech,openai_tts,elevenlabs,replicate_chatterbox",
  "azure_edge_tts,azure_speech,openai_tts,qwen_dashscope,elevenlabs,replicate_qwen3_tts,replicate_chatterbox",
  "replicate_qwen3_tts,replicate_chatterbox,openai_tts,qwen_dashscope,elevenlabs,azure_edge_tts,azure_speech",
]
required = false
scope = "workspace"

[[configurable]]
key = "output_directory"
label = "Output Directory"
description = "Default workspace-relative directory for generated images."
type = "string"
default = "media/image"
required = false
scope = "workspace"

[[configurable]]
key = "speech_output_directory"
label = "Speech Output Directory"
description = "Default workspace-relative directory for generated speech audio."
type = "string"
default = "media/audio"
required = false
scope = "workspace"

[builder_config]
raw = {}
