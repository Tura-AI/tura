<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>POWERPROMPT — Prompt Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;450;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#edece6;
    --side:#f5f4ef;
    --card:#ffffff;
    --ink:#121210;
    --ink-2:#5a584f;
    --ink-3:#8d8b80;
    --line:rgba(18,18,16,.12);
    --line-2:rgba(18,18,16,.06);
    --lime:#c9fa46;
    --lime-d:#b3e637;
    --sans:"Geist",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --mono:"Geist Mono",ui-monospace,"SF Mono",Menlo,monospace;
    --side-w:264px;
    --ease:cubic-bezier(.22,.7,.2,1);
  }
  *{ box-sizing:border-box; }
  html{ -webkit-text-size-adjust:100%; }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); font-weight:430; font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased; display:flex; min-height:100vh; }
  a{ color:inherit; text-decoration:none; }
  button{ font:inherit; color:inherit; background:none; border:none; cursor:pointer; }
  img{ display:block; max-width:100%; }
  ::selection{ background:var(--lime); color:var(--ink); }
  .mono{ font-family:var(--mono); text-transform:uppercase; letter-spacing:.11em; }

  /* ============== SIDEBAR ============== */
  .sidebar{
    width:var(--side-w); flex:none; position:sticky; top:0; height:100vh;
    overflow-y:auto; background:var(--side); border-right:1px solid var(--line);
    padding:22px 16px 20px; display:flex; flex-direction:column; gap:4px;
  }
  .sidebar::-webkit-scrollbar{ width:8px; } .sidebar::-webkit-scrollbar-thumb{ background:rgba(0,0,0,.12); border-radius:8px; }
  .logo{ display:flex; align-items:center; gap:10px; padding:4px 8px 20px; }
  .logo .bolt{ width:30px; height:30px; border-radius:8px; background:var(--ink); display:grid; place-items:center; flex:none; }
  .logo .bolt svg{ width:16px; height:16px; color:var(--lime); }
  .logo b{ font-weight:700; font-size:18px; letter-spacing:-.04em; }
  .logo span{ font-style:italic; font-weight:400; font-size:18px; color:var(--ink-2); letter-spacing:-.02em; }

  .navi{ display:flex; align-items:center; gap:12px; padding:9px 12px; border-radius:11px; color:var(--ink-2); font-size:14.5px; font-weight:480; cursor:pointer; transition:background .18s,color .18s; user-select:none; }
  .navi:hover{ background:rgba(18,18,16,.055); color:var(--ink); }
  .navi.active{ background:rgba(18,18,16,.07); color:var(--ink); font-weight:560; }
  .navi svg{ width:18px; height:18px; flex:none; stroke-width:1.7; }
  .navi .new{ margin-left:auto; font-family:var(--mono); font-size:8px; letter-spacing:.08em; background:var(--lime); color:var(--ink); padding:2px 6px; border-radius:5px; font-weight:600; }
  .navi .chev{ margin-left:auto; width:14px; height:14px; opacity:.5; }

  .side-label{ font-family:var(--mono); font-size:9.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--ink-3); padding:0 12px; margin:20px 0 7px; }
  .cat{ display:flex; align-items:center; gap:11px; padding:7px 12px; border-radius:10px; color:var(--ink-2); font-size:14px; cursor:pointer; transition:.16s; }
  .cat:hover{ background:rgba(18,18,16,.05); color:var(--ink); }
  .cat.active{ color:var(--ink); font-weight:560; }
  .cat .dot{ width:8px; height:8px; border-radius:50%; background:var(--ink); flex:none; opacity:.55; }
  .cat.active .dot{ background:var(--lime); opacity:1; box-shadow:0 0 0 3px rgba(201,250,70,.3); }

  .side-foot{ margin-top:auto; padding-top:20px; }
  .promo-card{ background:var(--lime); color:var(--ink); border-radius:14px; padding:15px 16px; position:relative; overflow:hidden; }
  .promo-card h4{ font-size:14px; font-weight:650; letter-spacing:-.02em; margin:0 0 4px; max-width:78%; line-height:1.2; }
  .promo-card p{ font-size:11.5px; color:rgba(18,18,16,.7); margin:0; }
  .promo-card .gift{ position:absolute; top:13px; right:13px; width:26px; height:26px; }
  .side-cta{ display:flex; align-items:center; gap:12px; margin-top:14px; }
  .btn-ink{ background:var(--ink); color:#fff; font-family:var(--mono); font-size:11px; letter-spacing:.09em; text-transform:uppercase; padding:11px 16px; border-radius:10px; transition:.22s; flex:1; text-align:center; }
  .btn-ink:hover{ background:var(--lime); color:var(--ink); }
  .side-cta .free{ font-size:12.5px; color:var(--ink-3); white-space:nowrap; cursor:pointer; }
  .side-cta .free:hover{ color:var(--ink); }
  .side-legal{ display:flex; align-items:center; gap:8px; margin-top:18px; padding:0 4px; font-size:11.5px; color:var(--ink-3); flex-wrap:wrap; }
  .side-legal a:hover{ color:var(--ink); }
  .side-legal .stars{ margin-left:auto; font-family:var(--mono); font-size:10px; background:rgba(18,18,16,.06); padding:3px 8px; border-radius:6px; color:var(--ink-2); display:inline-flex; gap:5px; align-items:center; }

  /* ============== MAIN ============== */
  .main{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .mtop{ display:none; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--line); position:sticky; top:0; z-index:520; background:color-mix(in srgb,var(--bg) 90%,transparent); backdrop-filter:blur(10px); }
  .mtop .burger{ width:38px; height:38px; border:1px solid var(--line); border-radius:9px; display:grid; place-items:center; }

  .topbar{ position:sticky; top:0; z-index:500; background:color-mix(in srgb,var(--bg) 88%,transparent); backdrop-filter:blur(11px); border-bottom:1px solid var(--line); }
  .filterbar{ display:flex; align-items:center; justify-content:space-between; gap:16px; padding:14px clamp(16px,2.4vw,34px); }
  .ftabs{ display:flex; gap:5px; overflow-x:auto; scrollbar-width:none; }
  .ftabs::-webkit-scrollbar{ display:none; }
  .ftab{ display:flex; align-items:center; gap:8px; padding:8px 15px; border-radius:30px; font-size:14px; font-weight:480; color:var(--ink-2); cursor:pointer; transition:.18s; white-space:nowrap; }
  .ftab:hover{ color:var(--ink); background:rgba(18,18,16,.05); }
  .ftab.active{ background:var(--ink); color:#fff; }
  .ftab svg{ width:15px; height:15px; flex:none; stroke-width:1.7; }
  .fsort{ display:flex; align-items:center; gap:3px; flex:none; }
  .sortbtn{ padding:8px 14px; border-radius:30px; font-size:14px; color:var(--ink-3); cursor:pointer; transition:.18s; white-space:nowrap; }
  .sortbtn:hover{ color:var(--ink); }
  .sortbtn.active{ background:var(--ink); color:#fff; font-weight:500; }

  .searchbar{ max-height:0; overflow:hidden; transition:max-height .32s var(--ease); }
  .searchbar.open{ max-height:72px; }
  .searchbar .inner{ display:flex; align-items:center; gap:11px; padding:0 clamp(16px,2.4vw,34px) 14px; }
  .searchbar svg{ width:18px; height:18px; color:var(--ink-3); flex:none; }
  .searchbar input{ flex:1; border:none; outline:none; background:var(--card); border:1px solid var(--line); border-radius:11px; padding:12px 16px; font-family:var(--sans); font-size:15px; color:var(--ink); }
  .searchbar input::placeholder{ color:var(--ink-3); }

  /* ============== GALLERY / MASONRY ============== */
  .gallery{ padding:clamp(16px,2.4vw,34px); padding-bottom:120px; }
  .masonry{ display:flex; align-items:flex-start; gap:14px; }
  .ms-col{ display:flex; flex-direction:column; gap:14px; flex:1 1 0; min-width:0; }

  .tile{ position:relative; border-radius:15px; overflow:hidden; background:#e7e7e1; cursor:pointer; transition:transform .28s var(--ease), box-shadow .28s var(--ease); animation:fadeUp .5s var(--ease) both; }
  .tile:hover{ transform:translateY(-3px); box-shadow:0 14px 32px rgba(18,18,16,.16); }
  .tile .media{ position:relative; width:100%; aspect-ratio:var(--ar,3/4); overflow:hidden; }
  .tile img{ width:100%; height:100%; object-fit:cover; transition:transform .65s var(--ease); }
  .tile:hover img{ transform:scale(1.05); }
  .fb{ position:absolute; inset:0; background:var(--fb-bg,var(--ink)); color:var(--fb-fg,var(--lime)); display:grid; place-items:center; }
  .fb-mark{ font-size:clamp(2.6rem,5.5vw,5rem); font-weight:700; letter-spacing:-.05em; }

  .ov{ position:absolute; inset:0; opacity:0; transition:opacity .28s var(--ease); padding:13px; display:flex; flex-direction:column; justify-content:space-between;
       background:linear-gradient(to top, rgba(8,8,6,.84) 0%, rgba(8,8,6,.25) 42%, rgba(8,8,6,0) 72%); }
  .tile:hover .ov{ opacity:1; }
  .ov__top{ display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .ov .model{ font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:#fff; background:rgba(255,255,255,.18); backdrop-filter:blur(6px); padding:5px 9px; border-radius:7px; }
  .ov .bm{ width:32px; height:32px; border-radius:9px; background:rgba(255,255,255,.92); display:grid; place-items:center; color:var(--ink); transition:.18s; flex:none; }
  .ov .bm:hover{ background:#fff; transform:scale(1.06); }
  .ov .bm.on{ background:var(--lime); }
  .ov .bm.on svg{ fill:var(--ink); }
  .ov .bm svg{ width:15px; height:15px; }
  .ov h3{ color:#fff; font-size:15.5px; font-weight:600; letter-spacing:-.01em; line-height:1.16; margin:0 0 9px; }
  .ov__row{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .ov .price{ font-family:var(--mono); font-weight:600; font-size:16px; color:var(--lime); }
  .ov .price.free{ color:#fff; }
  .ov .add{ font-family:var(--mono); font-size:10.5px; letter-spacing:.07em; text-transform:uppercase; background:var(--lime); color:var(--ink); padding:9px 13px; border-radius:9px; transition:.18s; display:inline-flex; align-items:center; gap:6px; }
  .ov .add:hover{ background:#fff; }
  .ov .add svg{ width:12px; height:12px; }
  .savedmark{ position:absolute; top:11px; right:11px; z-index:4; width:28px; height:28px; border-radius:8px; background:var(--lime); color:var(--ink); display:none; place-items:center; box-shadow:0 3px 10px rgba(0,0,0,.22); }
  .savedmark svg{ width:14px; height:14px; fill:var(--ink); }
  .tile.saved .savedmark{ display:grid; }
  .tile:hover .savedmark{ display:none; }

  .empty{ width:100%; padding:90px 20px; text-align:center; color:var(--ink-2); }
  .empty .big{ font-size:1.4rem; font-weight:600; letter-spacing:-.02em; margin-bottom:8px; color:var(--ink); }

  @keyframes fadeUp{ from{ opacity:0; transform:translateY(14px);} to{ opacity:1; transform:none;} }

  /* ============== DOCK ============== */
  .dock{ position:fixed; bottom:22px; left:calc(50% + var(--side-w)/2); transform:translateX(-50%); z-index:1400;
         display:flex; gap:5px; padding:8px; background:rgba(248,247,243,.72); backdrop-filter:blur(18px) saturate(1.4);
         border:1px solid var(--line); border-radius:21px; box-shadow:0 16px 44px rgba(18,18,16,.16); }
  .dock button{ position:relative; width:44px; height:44px; border-radius:13px; display:grid; place-items:center; color:var(--ink-2); transition:.18s; }
  .dock button:hover{ background:rgba(18,18,16,.07); color:var(--ink); }
  .dock button.active{ background:var(--ink); color:#fff; }
  .dock button svg{ width:20px; height:20px; stroke-width:1.7; }
  .dock .cbadge{ position:absolute; top:5px; right:5px; min-width:16px; height:16px; padding:0 4px; border-radius:8px; background:var(--lime); color:var(--ink); font-family:var(--mono); font-size:9px; font-weight:600; display:grid; place-items:center; transform:scale(0); transition:transform .25s var(--ease); }
  .dock .cbadge.show{ transform:scale(1); }

  /* ============== LIGHTBOX ============== */
  .lb{ position:fixed; inset:0; z-index:2000; display:none; align-items:center; justify-content:center; padding:24px; background:rgba(12,12,10,.62); backdrop-filter:blur(7px); }
  .lb.open{ display:flex; }
  .lb__card{ background:var(--card); border-radius:20px; overflow:hidden; max-width:940px; width:100%; max-height:88vh; display:flex; box-shadow:0 30px 90px rgba(0,0,0,.45); position:relative; }
  .lb__img{ flex:1.1; min-width:0; position:relative; background:#e7e7e1; }
  .lb__img img{ width:100%; height:100%; object-fit:cover; }
  .lb__info{ flex:.92; padding:32px 30px; display:flex; flex-direction:column; }
  .lb__info .model{ font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-3); margin-bottom:12px; display:flex; gap:8px; align-items:center; }
  .lb__info .model .d{ width:6px; height:6px; border-radius:50%; background:var(--lime); }
  .lb__info h2{ font-size:1.9rem; font-weight:680; letter-spacing:-.035em; line-height:1.04; margin:0 0 14px; }
  .lb__info .desc{ color:var(--ink-2); line-height:1.55; margin:0 0 22px; font-size:.97rem; }
  .lb__info .stats{ display:flex; gap:22px; margin-bottom:auto; padding-bottom:24px; }
  .lb__info .stats .k{ font-family:var(--mono); font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-3); margin-bottom:5px; }
  .lb__info .stats .v{ font-size:1.15rem; font-weight:600; letter-spacing:-.01em; }
  .lb__buy{ display:flex; align-items:center; gap:12px; border-top:1px solid var(--line); padding-top:22px; }
  .lb__buy .price{ font-family:var(--mono); font-weight:600; font-size:1.7rem; letter-spacing:-.02em; }
  .lb__buy .price.free{ color:#3c8a4e; }
  .lb__buy .add{ margin-left:auto; background:var(--ink); color:#fff; font-family:var(--mono); font-size:11.5px; letter-spacing:.09em; text-transform:uppercase; padding:14px 22px; border-radius:11px; transition:.2s; display:inline-flex; align-items:center; gap:8px; }
  .lb__buy .add:hover{ background:var(--lime); color:var(--ink); }
  .lb__buy .add svg{ width:14px; height:14px; }
  .lb__close{ position:absolute; top:16px; right:16px; z-index:5; width:38px; height:38px; border-radius:11px; background:rgba(255,255,255,.92); display:grid; place-items:center; color:var(--ink); transition:.2s; }
  .lb__close:hover{ background:var(--ink); color:#fff; }

  /* ============== TOAST + SCRIM ============== */
  .toast{ position:fixed; bottom:90px; left:calc(50% + var(--side-w)/2); transform:translate(-50%,150%); background:var(--ink); color:#fff; font-family:var(--mono); font-size:12px; letter-spacing:.04em; padding:13px 20px; border-radius:11px; z-index:2200; display:flex; align-items:center; gap:10px; box-shadow:0 12px 32px rgba(0,0,0,.3); transition:transform .45s var(--ease); }
  .toast.show{ transform:translate(-50%,0); }
  .toast .d{ width:7px; height:7px; border-radius:50%; background:var(--lime); }
  .scrim{ position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1550; display:none; }
  .scrim.show{ display:block; }

  /* ============== RESPONSIVE ============== */
  @media (max-width:1100px){
    .lb__card{ flex-direction:column; max-height:90vh; overflow:auto; }
    .lb__img{ aspect-ratio:16/10; flex:none; }
  }
  @media (max-width:960px){
    :root{ --side-w:0px; }
    .sidebar{ position:fixed; top:0; left:0; width:264px; transform:translateX(-100%); transition:transform .3s var(--ease); z-index:1600; box-shadow:0 0 50px rgba(0,0,0,.25); }
    .sidebar.open{ transform:none; }
    .mtop{ display:flex; }
    .dock{ left:50%; }
    .toast{ left:50%; }
  }
  @media (max-width:560px){
    .filterbar{ flex-wrap:wrap; gap:10px; }
    .fsort{ width:100%; }
  }
  @media (prefers-reduced-motion:reduce){
    *{ animation:none !important; }
    .tile{ animation:none; }
  }
</style>
</head>
<body>

  <!-- ============== SIDEBAR ============== -->
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <span class="bolt"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4.5 13.5H11l-1 8.5L19.5 10H13l0-8Z"/></svg></span>
      <b>POWERPROMPT</b><span>Gallery</span>
    </div>

    <div class="navi active" data-nav="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v10h14V10"/></svg> Home</div>
    <div class="navi" data-nav="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg> Search</div>
    <div class="navi" data-nav="history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg> History</div>
    <div class="navi" data-nav="favorites"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 20s-7-4.4-9.2-8.3C1.1 8.5 2.6 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.4 0 4.9 3.5 3.2 6.7C19 15.6 12 20 12 20Z"/></svg> Favorites <span class="new">NEW</span></div>

    <div class="side-label">Categories</div>
    <div id="cats"></div>

    <div class="side-label">More from us</div>
    <div class="navi" data-nav="ext"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 9h18"/></svg> Browser extension</div>
    <div class="navi" data-nav="figma"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="6" r="3"/><circle cx="9" cy="18" r="3"/><circle cx="15" cy="12" r="3"/></svg> Figma plugin</div>
    <div class="navi" data-nav="api"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m8 16-4-4 4-4"/><path d="m16 8 4 4-4 4"/></svg> Public API</div>

    <div class="side-foot">
      <div class="promo-card">
        <svg class="gift" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="4" y="9" width="16" height="11" rx="1.5"/><path d="M4 13h16M12 9v11M12 9C9 9 8 4 12 4c4 0 3 5 0 5Z"/></svg>
        <h4>Sell your prompts</h4>
        <p>Keep 85% of every sale — paid weekly.</p>
      </div>
      <div class="side-cta">
        <button class="btn-ink" id="getStarted">Get started</button>
        <span class="free" id="freeBtn">Free prompts</span>
      </div>
      <div class="side-legal">
        <a href="#">Terms</a> · <a href="#">Privacy</a> · <a href="#">Refund</a>
        <span class="stars"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.6-5.2 4.6 1.6 6.8L12 17.3 5.8 20.9l1.6-6.8L2.2 8.9l6.9-.6z"/></svg> 4.8</span>
      </div>
    </div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <!-- ============== MAIN ============== -->
  <main class="main">
    <div class="mtop">
      <button class="burger" id="burger" aria-label="Menu"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
      <span class="bolt" style="width:28px;height:28px;border-radius:7px;background:var(--ink);display:grid;place-items:center"><svg viewBox="0 0 24 24" fill="var(--lime)" width="15" height="15"><path d="M13 2 4.5 13.5H11l-1 8.5L19.5 10H13l0-8Z"/></svg></span>
      <b style="font-weight:700;letter-spacing:-.03em">POWERPROMPT</b>
    </div>

    <div class="topbar">
      <div class="filterbar">
        <div class="ftabs" id="ftabs">
          <button class="ftab active" data-model="all"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="7" cy="7" r="2.4"/><circle cx="17" cy="7" r="2.4"/><circle cx="7" cy="17" r="2.4"/><circle cx="17" cy="17" r="2.4"/></svg> All</button>
          <button class="ftab" data-model="GPT-4o"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="8"/></svg> GPT-4o</button>
          <button class="ftab" data-model="Claude"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3v18M3 12h18M5.6 5.6l12.8 12.8M18.4 5.6 5.6 18.4"/></svg> Claude</button>
          <button class="ftab" data-model="Midjourney"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 4 4 19h16z"/></svg> Midjourney</button>
          <button class="ftab" data-model="Flux"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3 21 12 12 21 3 12z"/></svg> Flux</button>
        </div>
        <div class="fsort" id="fsort">
          <button class="sortbtn active" data-sort="featured">Featured</button>
          <button class="sortbtn" data-sort="newest">Newest</button>
          <button class="sortbtn" data-sort="popular">Popular</button>
        </div>
      </div>
      <div class="searchbar" id="searchbar">
        <div class="inner">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input id="search" type="text" placeholder="Search prompts — “portrait”, “poster”, “cold email”…" />
        </div>
      </div>
    </div>

    <div class="gallery">
      <div class="masonry" id="masonry"></div>
    </div>
  </main>

  <!-- ============== DOCK ============== -->
  <nav class="dock" id="dock">
    <button class="active" data-dock="home" aria-label="Home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v10h14V10"/></svg></button>
    <button data-dock="history" aria-label="History"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></button>
    <button data-dock="favorites" aria-label="Favorites"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 20s-7-4.4-9.2-8.3C1.1 8.5 2.6 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.4 0 4.9 3.5 3.2 6.7C19 15.6 12 20 12 20Z"/></svg></button>
    <button data-dock="collections" aria-label="Collections"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg></button>
    <button data-dock="cart" aria-label="Cart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 7h13l-1.2 9.5a2 2 0 0 1-2 1.75H9.2a2 2 0 0 1-2-1.75L6 7Z"/><path d="M9 7a3 3 0 0 1 6 0"/></svg><span class="cbadge" id="cbadge">0</span></button>
    <button data-dock="generate" aria-label="Generate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2.5 2.5M15.5 15.5 18 18M18 6l-2.5 2.5M8.5 15.5 6 18"/></svg></button>
  </nav>

  <!-- ============== LIGHTBOX ============== -->
  <div class="lb" id="lb"><div class="lb__card" id="lbCard"></div></div>

  <!-- ============== TOAST ============== -->
  <div class="toast" id="toast"><span class="d"></span><span id="toastMsg"></span></div>

<script>
/* ---------------- data ---------------- */
const LOTS = [
  {id:207,title:"Cinematic Still, 35mm",model:"Midjourney",cat:"Image",price:9,sold:4700,rating:5.0,seller:"Atlas Studio",ar:"3/4",desc:"Film-grade stills with real lens language — focal length, grain, and lighting that reads as cinema."},
  {id:233,title:"Ink Wash Warrior",model:"Midjourney",cat:"Image",price:12,sold:2100,rating:4.9,seller:"Sumi Lab",ar:"2/3",desc:"Sumi-e meets splash ink. Dramatic monochrome heroes with controlled negative space."},
  {id:174,title:"Editorial Photo Grade",model:"Flux",cat:"Photography",price:11,sold:1300,rating:4.9,seller:"N. Sørensen",ar:"3/4",desc:"Magazine-style color grading. Warm skin, deep shadow, that quiet print look — no garish presets."},
  {id:301,title:"Magazine Cover Maker",model:"GPT-4o",cat:"Design",price:14,sold:3300,rating:4.8,seller:"Field & Co.",ar:"4/5",desc:"Drop in a photo, get a full cover — masthead, cover lines, barcode, the works."},
  {id:118,title:"Studio Portrait, Soft Light",model:"Flux",cat:"Photography",price:10,sold:1800,rating:4.9,seller:"Lumen",ar:"4/5",desc:"Clean beauty light with a believable falloff. Looks shot, not rendered."},
  {id:198,title:"Logo Sketch, Mono-line",model:"Midjourney",cat:"Design",price:13,sold:980,rating:4.8,seller:"Studio Kö",ar:"1/1",desc:"Single-weight line marks with real negative-space thinking. Vector-ready directions, fast."},
  {id:142,title:"The Cold-Email Closer",model:"GPT-4o",cat:"Marketing",price:12,sold:2300,rating:4.9,seller:"Marta Vey",ar:"4/3",desc:"Cold emails that actually get replies. A tested 4-line structure with subject-line variants baked in."},
  {id:160,title:"Senior Code Reviewer",model:"Claude",cat:"Code",price:18,sold:1100,rating:4.8,seller:"D. Okonkwo",ar:"1/1",desc:"Reviews your diff like a staff engineer — catches risk, suggests fixes, explains the why."},
  {id:255,title:"Neon Street, Night",model:"Flux",cat:"Photography",price:8,sold:2600,rating:4.7,seller:"Kuro",ar:"3/4",desc:"Rain-slick neon with real reflections and grain. That blade-runner-on-a-budget look, nailed."},
  {id:189,title:"Brand Voice, Bottled",model:"Claude",cat:"Marketing",price:24,sold:860,rating:4.9,seller:"Field & Co.",ar:"4/3",desc:"Feed it three samples; get a reusable voice guide that writes anything in your exact tone."},
  {id:211,title:"Anime Key Visual",model:"Midjourney",cat:"Image",price:15,sold:3900,rating:5.0,seller:"Sakuga",ar:"2/3",desc:"Poster-grade key art with depth, rim light, and a real focal subject. Print at A2."},
  {id:31,title:"The Socratic Tutor",model:"GPT-4o",cat:"Research",price:0,sold:9200,rating:4.7,seller:"J. Halloran",ar:"5/4",desc:"Never hands you the answer — leads you there with questions at exactly the right difficulty."},
  {id:276,title:"Product Shot, White BG",model:"Flux",cat:"Photography",price:9,sold:1500,rating:4.8,seller:"Lumen",ar:"1/1",desc:"Clean e-commerce hero shots with soft contact shadow. Drop-in ready for any storefront."},
  {id:212,title:"The Worldbuilder's Bible",model:"GPT-4o",cat:"Writing",price:29,sold:720,rating:5.0,seller:"E. Castellanos",ar:"4/5",desc:"Builds a consistent fictional world — geography, factions, history — and holds continuity."},
  {id:248,title:"Vintage Film Poster",model:"Midjourney",cat:"Design",price:13,sold:2200,rating:4.9,seller:"Reel",ar:"3/4",desc:"70s grain, bold type, halftone. One-sheets that look pulled from an archive."},
  {id:156,title:"Bug-to-Test Generator",model:"GPT-4o",cat:"Code",price:15,sold:1900,rating:4.8,seller:"R. Mehta",ar:"4/3",desc:"Paste a bug report, get a failing test that reproduces it — plus the fix and the edge cases."},
  {id:267,title:"Dreamy Bokeh Portrait",model:"Flux",cat:"Photography",price:10,sold:1700,rating:4.8,seller:"Lumen",ar:"4/5",desc:"Creamy backgrounds, golden-hour warmth, eyes in razor focus. Pure mood."},
  {id:101,title:"Meeting → Memo",model:"Claude",cat:"Productivity",price:6,sold:5100,rating:4.7,seller:"Ops Guild",ar:"4/3",desc:"Turns a messy transcript into a crisp decision memo: owners, dates, the one thing that matters."},
  {id:290,title:"Concept Car, Studio",model:"Midjourney",cat:"Image",price:12,sold:1400,rating:4.8,seller:"Forme",ar:"3/2",desc:"Automotive design renders with believable studio reflections and a real sense of scale."},
  {id:77,title:"The Plot Doctor",model:"Claude",cat:"Writing",price:16,sold:1400,rating:4.9,seller:"H. Mbeki",ar:"1/1",desc:"Diagnoses why your story stalls and prescribes the fix — stakes, pacing, the scene you're dodging."},
  {id:221,title:"Watercolor Cityscape",model:"Flux",cat:"Image",price:9,sold:2000,rating:4.9,seller:"Aquarelle",ar:"3/4",desc:"Loose, luminous washes with confident linework. Soft skies, busy streets."},
  {id:63,title:"Inbox Zero Strategist",model:"Claude",cat:"Productivity",price:8,sold:3400,rating:4.6,seller:"Lina P.",ar:"4/3",desc:"Triage, draft, and schedule a full inbox in one pass — sorted by what moves your week."}
];

const CATS = ["Image","Photography","Design","Writing","Code","Marketing","Productivity","Research"];
const MAP = {}; LOTS.forEach(l=>MAP[l.id]=l);

function dim(ar){ const [w,h]=ar.split('/').map(Number); const W=560; return W+'/'+Math.round(W*h/w); }
const img = (id,ar)=>`https://picsum.photos/seed/pp${id}/${dim(ar)}`;

/* ---------------- fallback ---------------- */
function ppFallback(el){
  const m=el.parentNode; const t=el.dataset.t||"P"; const i=+(el.dataset.i||0); const alt=i%2===1;
  m.style.setProperty('--fb-bg', alt?'var(--lime)':'var(--ink)');
  m.style.setProperty('--fb-fg', alt?'var(--ink)':'var(--lime)');
  el.remove();
  const d=document.createElement('div'); d.className='fb';
  d.innerHTML=`<span class="fb-mark">${(t[0]||'P').toUpperCase()}</span>`;
  m.prepend(d);
}
window.ppFallback=ppFallback;

/* ---------------- build categories ---------------- */
document.getElementById('cats').innerHTML = CATS.map(c=>
  `<div class="cat" data-cat="${c}"><span class="dot"></span>${c}</div>`).join('');

/* ---------------- build tiles ---------------- */
const masonry=document.getElementById('masonry');
const fmt=n=> n>=1000 ? (n/1000).toFixed(1).replace('.0','')+'k' : n;

masonry.dataset.built='1';
const tilesHTML = LOTS.map((l,i)=>{
  const free=l.price===0;
  return `<article class="tile" data-id="${l.id}" data-model="${l.model}" data-cat="${l.cat}"
    data-search="${(l.title+' '+l.model+' '+l.cat+' '+l.desc).toLowerCase()}" style="--ar:${l.ar}">
    <div class="savedmark"><svg viewBox="0 0 24 24"><path d="M6 4h12v17l-6-4-6 4V4Z"/></svg></div>
    <div class="media">
      <img src="${img(l.id,l.ar)}" alt="${l.title}" loading="lazy" data-t="${l.title}" data-i="${i}" onerror="ppFallback(this)">
    </div>
    <div class="ov">
      <div class="ov__top">
        <span class="model">${l.model}</span>
        <button class="bm" aria-label="Save"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 4h12v17l-6-4-6 4V4Z"/></svg></button>
      </div>
      <div>
        <h3>${l.title}</h3>
        <div class="ov__row">
          <span class="price ${free?'free':''}">${free?'Free':'$'+l.price}</span>
          <button class="add">Add <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
        </div>
      </div>
    </div>
  </article>`;
}).join('');
masonry.innerHTML = tilesHTML;
const tiles=[...masonry.querySelectorAll('.tile')];

/* ---------------- state + masonry layout ---------------- */
const saved=new Set();
let state={model:'all',cat:'all',sort:'featured',term:'',favOnly:false};
let firstLayout=true; const GAP=14;
function colCount(){ return Math.max(2, Math.min(6, Math.floor((masonry.clientWidth+GAP)/(238+GAP)))); }
function visibleSorted(){
  let v=tiles.filter(t=>{
    const okM=state.model==='all'||t.dataset.model===state.model;
    const okC=state.cat==='all'||t.dataset.cat===state.cat;
    const okT=!state.term||t.dataset.search.includes(state.term);
    const okF=!state.favOnly||saved.has(t.dataset.id);
    return okM&&okC&&okT&&okF;
  });
  const by={
    featured:(a,b)=>MAP[b.dataset.id].sold-MAP[a.dataset.id].sold,
    newest:(a,b)=>b.dataset.id-a.dataset.id,
    popular:(a,b)=>MAP[b.dataset.id].rating-MAP[a.dataset.id].rating||MAP[b.dataset.id].sold-MAP[a.dataset.id].sold
  }[state.sort];
  return v.sort(by);
}
function layout(){
  const v=visibleSorted();
  masonry.innerHTML='';
  if(!v.length){
    const e=document.createElement('div'); e.className='empty';
    e.innerHTML='<div class="big">Nothing here yet</div><div>'+(state.favOnly?'Tap the bookmark on any prompt to save it.':'Try a different filter or search.')+'</div>';
    masonry.appendChild(e); return;
  }
  const n=colCount(), cols=[];
  for(let i=0;i<n;i++){ const c=document.createElement('div'); c.className='ms-col'; masonry.appendChild(c); cols.push({el:c,h:0}); }
  v.forEach((t,idx)=>{
    let s=cols[0]; for(const c of cols) if(c.h<s.h) s=c;
    t.style.animationDelay = firstLayout ? (Math.min(idx,24)*0.03)+'s' : '0s';
    if(!firstLayout) t.style.animation='none';
    s.el.appendChild(t);
    s.h += t.getBoundingClientRect().height + GAP;
  });
  firstLayout=false;
}

/* ---------------- toast + cart ---------------- */
let cart=0; const cbadge=document.getElementById('cbadge');
const toast=document.getElementById('toast'), tmsg=document.getElementById('toastMsg'); let tt;
function showToast(m){ tmsg.textContent=m; toast.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>toast.classList.remove('show'),2100); }
function bump(){ cart++; cbadge.textContent=cart; cbadge.classList.add('show'); cbadge.style.transform='scale(1.4)'; setTimeout(()=>cbadge.style.transform='scale(1)',160); }

/* ---------------- tile interactions ---------------- */
masonry.addEventListener('click',e=>{
  const bm=e.target.closest('.bm');
  if(bm){ e.stopPropagation(); const tile=bm.closest('.tile'); const id=tile.dataset.id;
    if(saved.has(id)){ saved.delete(id); tile.classList.remove('saved'); bm.classList.remove('on'); showToast('Removed from favorites'); }
    else{ saved.add(id); tile.classList.add('saved'); bm.classList.add('on'); showToast('Saved to favorites'); }
    if(state.favOnly) layout(); return; }
  const add=e.target.closest('.add');
  if(add){ e.stopPropagation(); bump(); showToast('Added — '+MAP[add.closest('.tile').dataset.id].title); return; }
  const tile=e.target.closest('.tile');
  if(tile) openLB(tile.dataset.id);
});

/* ---------------- lightbox ---------------- */
const lb=document.getElementById('lb'), lbCard=document.getElementById('lbCard');
function openLB(id){
  const l=MAP[id]; const free=l.price===0; const sv=saved.has(String(id));
  lbCard.innerHTML=`
    <button class="lb__close" aria-label="Close"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
    <div class="lb__img"><img src="${'https://picsum.photos/seed/pp'+id+'/'+dim(l.ar)}" alt="${l.title}" data-t="${l.title}" data-i="0" onerror="ppFallback(this)"></div>
    <div class="lb__info">
      <div class="model"><span class="d"></span>${l.model} · ${l.cat}</div>
      <h2>${l.title}</h2>
      <p class="desc">${l.desc}</p>
      <div class="stats">
        <div><div class="k">Rating</div><div class="v">★ ${l.rating}</div></div>
        <div><div class="k">Sold</div><div class="v">${fmt(l.sold)}</div></div>
        <div><div class="k">Seller</div><div class="v">${l.seller}</div></div>
      </div>
      <div class="lb__buy">
        <span class="price ${free?'free':''}">${free?'Free':'$'+l.price}</span>
        <button class="add">${free?'Get it free':'Add to cart'} <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
      </div>
    </div>`;
  lb.classList.add('open');
  lbCard.querySelector('.lb__close').onclick=closeLB;
  lbCard.querySelector('.add').onclick=()=>{ bump(); showToast('Added — '+l.title); closeLB(); };
}
function closeLB(){ lb.classList.remove('open'); }
lb.addEventListener('click',e=>{ if(e.target===lb) closeLB(); });
addEventListener('keydown',e=>{ if(e.key==='Escape') closeLB(); });

/* ---------------- sidebar nav ---------------- */
function setActiveNav(name){ document.querySelectorAll('.navi').forEach(n=>n.classList.toggle('active',n.dataset.nav===name)); }
function setActiveCat(c){ document.querySelectorAll('.cat').forEach(x=>x.classList.toggle('active',x.dataset.cat===c)); }
function setDock(name){ document.querySelectorAll('.dock button').forEach(b=>b.classList.toggle('active',b.dataset.dock===name)); }

function goHome(){ state.model='all'; state.cat='all'; state.favOnly=false; state.term=''; document.getElementById('search').value='';
  document.querySelectorAll('.ftab').forEach(x=>x.classList.toggle('active',x.dataset.model==='all'));
  setActiveNav('home'); setActiveCat('__none'); setDock('home'); layout(); scrollTo({top:0,behavior:'smooth'}); }
function goFavorites(){ state.favOnly=true; state.model='all'; state.cat='all';
  document.querySelectorAll('.ftab').forEach(x=>x.classList.toggle('active',x.dataset.model==='all'));
  setActiveNav('favorites'); setActiveCat('__none'); setDock('favorites'); layout(); scrollTo({top:0,behavior:'smooth'}); }

document.querySelectorAll('.navi').forEach(n=>n.addEventListener('click',()=>{
  const k=n.dataset.nav;
  closeDrawer();
  if(k==='home') goHome();
  else if(k==='favorites') goFavorites();
  else if(k==='search'){ const sb=document.getElementById('searchbar'); sb.classList.toggle('open'); if(sb.classList.contains('open')) document.getElementById('search').focus(); }
  else if(k==='history') showToast('History is empty for now');
  else if(k==='ext') showToast('Browser extension — coming soon');
  else if(k==='figma') showToast('Figma plugin — coming soon');
  else if(k==='api') showToast('API docs — coming soon');
}));
document.getElementById('cats').addEventListener('click',e=>{
  const c=e.target.closest('.cat'); if(!c) return; closeDrawer();
  state.cat=c.dataset.cat; state.favOnly=false; setActiveCat(state.cat); setActiveNav('__none'); setDock('home'); layout();
});

/* ---------------- top filters ---------------- */
document.getElementById('ftabs').addEventListener('click',e=>{
  const b=e.target.closest('.ftab'); if(!b) return;
  document.querySelectorAll('.ftab').forEach(x=>x.classList.remove('active')); b.classList.add('active');
  state.model=b.dataset.model; layout();
});
document.getElementById('fsort').addEventListener('click',e=>{
  const b=e.target.closest('.sortbtn'); if(!b) return;
  document.querySelectorAll('.sortbtn').forEach(x=>x.classList.remove('active')); b.classList.add('active');
  state.sort=b.dataset.sort; layout();
});
const si=document.getElementById('search');
si.addEventListener('input',()=>{ state.term=si.value.trim().toLowerCase(); layout(); });

/* ---------------- dock ---------------- */
document.getElementById('dock').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return; const k=b.dataset.dock;
  if(k==='home') goHome();
  else if(k==='favorites') goFavorites();
  else if(k==='history') showToast('History is empty for now');
  else if(k==='collections') showToast('Collections — coming soon');
  else if(k==='cart') showToast(cart?cart+' prompt'+(cart>1?'s':'')+' in cart':'Your cart is empty');
  else if(k==='generate') showToast('In-app generation — coming soon');
});

/* ---------------- buttons ---------------- */
document.getElementById('getStarted').addEventListener('click',()=>showToast('Welcome — create your account'));
document.getElementById('freeBtn').addEventListener('click',()=>{ const t=document.querySelector('.ftab[data-model="all"]'); goHome(); showToast('Showing free + featured prompts'); });

/* ---------------- mobile drawer ---------------- */
const sidebar=document.getElementById('sidebar'), scrim=document.getElementById('scrim');
function openDrawer(){ sidebar.classList.add('open'); scrim.classList.add('show'); }
function closeDrawer(){ sidebar.classList.remove('open'); scrim.classList.remove('show'); }
document.getElementById('burger').addEventListener('click',openDrawer);
scrim.addEventListener('click',closeDrawer);

/* ---------------- init + relayout ---------------- */
layout();
let rt; addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(layout,140); });
addEventListener('load',layout);
if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(layout); }
</script>
</body>
</html>
