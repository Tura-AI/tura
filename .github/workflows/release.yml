name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  source-package:
    name: Source package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        run: |
          case "${GITHUB_REF_NAME}" in
            v[0-9]*.[0-9]*.[0-9]*)
              echo "release tag: ${GITHUB_REF_NAME}"
              ;;
            *)
              echo "Release tags must look like v0.0.0, v1.2.3, etc." >&2
              exit 1
              ;;
          esac

      - name: Create source archive
        run: |
          git archive \
            --format=tar.gz \
            --prefix="tura-${GITHUB_REF_NAME}/" \
            --output="tura-${GITHUB_REF_NAME}-source.tar.gz" \
            HEAD

      - name: Upload source package
        uses: actions/upload-artifact@v4
        with:
          name: tura-${{ github.ref_name }}-source
          path: tura-${{ github.ref_name }}-source.tar.gz
          if-no-files-found: error

  bin-package:
    name: Bin package (${{ matrix.release_os }})
    runs-on: ${{ matrix.runner }}
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - release_os: windows
            runner: windows-latest
            archive: zip
          - release_os: macos
            runner: macos-latest
            archive: tar
          - release_os: linux
            runner: ubuntu-latest
            archive: tar
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/tui/package-lock.json

      - name: Install TUI dependencies
        run: npm ci
        working-directory: apps/tui

      - name: Install Linux system dependencies
        if: matrix.release_os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build bin directory (Windows)
        if: matrix.release_os == 'windows'
        shell: pwsh
        run: .\scripts\build-bin.ps1 -SkipGui -SkipFrontendInstall -SkipCliRegister

      - name: Build bin directory (Unix)
        if: matrix.release_os != 'windows'
        run: sh scripts/build-bin.sh --skip-gui --skip-frontend-install --skip-cli-register

      - name: Compress bin directory (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path bin -DestinationPath "tura-${{ github.ref_name }}-${{ matrix.release_os }}-bin.zip" -Force

      - name: Compress bin directory (Unix)
        if: matrix.archive == 'tar'
        run: tar -czf "tura-${GITHUB_REF_NAME}-${{ matrix.release_os }}-bin.tar.gz" bin

      - name: Upload bin package
        uses: actions/upload-artifact@v4
        with:
          name: tura-${{ github.ref_name }}-${{ matrix.release_os }}-bin
          path: |
            tura-${{ github.ref_name }}-${{ matrix.release_os }}-bin.zip
            tura-${{ github.ref_name }}-${{ matrix.release_os }}-bin.tar.gz
          if-no-files-found: error

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - source-package
      - bin-package
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-artifacts/*
