name: Release

on:
  push:
    tags:
      - "release-v*"
  workflow_dispatch:
    inputs:
      release_probe:
        description: "Dry-run release detector. Must look like release-v0.0.0 or release-v0.0.0-ci."
        required: true
        default: "release-v0.0.0-ci"
      build_tui:
        description: "Build GUI/TUI release artifacts during the dry-run script test."
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  script-tests:
    name: Install/build release script test (${{ matrix.release_os }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - release_os: windows
            runner: windows-latest
          - release_os: macos
            runner: macos-latest
          - release_os: linux
            runner: ubuntu-latest
    env:
      TURA_RELEASE_PROBE: ${{ github.event.inputs.release_probe || github.ref_name || 'release-v0.0.0-ci' }}
      TURA_BUILD_TUI: ${{ github.event.inputs.build_tui || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-script-test-${{ matrix.release_os }}

      - name: Install Linux system dependencies
        if: matrix.release_os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev

      - name: Run install script tests (Windows)
        if: matrix.release_os == 'windows'
        shell: pwsh
        run: .\scripts\tests\scripts\test-install.ps1 -Full

      - name: Run install script tests (Unix)
        if: matrix.release_os != 'windows'
        run: sh scripts/tests/scripts/test-install.sh --full

      - name: Run build-release script tests (Windows)
        if: matrix.release_os == 'windows'
        shell: pwsh
        run: |
          if ($env:TURA_BUILD_TUI -ne "true") {
            .\scripts\tests\scripts\test-build-release.ps1 -ReleaseProbe $env:TURA_RELEASE_PROBE -SkipTui
          } else {
            .\scripts\tests\scripts\test-build-release.ps1 -ReleaseProbe $env:TURA_RELEASE_PROBE
          }

      - name: Run build-release script tests (Unix)
        if: matrix.release_os != 'windows'
        run: |
          args="--release-probe $TURA_RELEASE_PROBE"
          if [ "$TURA_BUILD_TUI" != "true" ]; then
            args="$args --skip-tui"
          fi
          # shellcheck disable=SC2086
          sh scripts/tests/scripts/test-build-release.sh $args

  source-package:
    name: Source package
    runs-on: ubuntu-latest
    needs:
      - script-tests
    if: startsWith(github.ref, 'refs/tags/release-v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        run: |
          case "${GITHUB_REF_NAME}" in
            release-v[0-9]*.[0-9]*.[0-9]*)
              echo "release tag: ${GITHUB_REF_NAME}"
              ;;
            *)
              echo "Release tags must look like release-v0.0.0, release-v1.2.3, etc." >&2
              exit 1
              ;;
          esac

      - name: Create source archive
        run: |
          git archive \
            --format=tar.gz \
            --prefix="tura-${GITHUB_REF_NAME}/" \
            --output="tura-${GITHUB_REF_NAME}-source.tar.gz" \
            HEAD

      - name: Upload source package
        uses: actions/upload-artifact@v4
        with:
          name: tura-${{ github.ref_name }}-source
          path: tura-${{ github.ref_name }}-source.tar.gz
          if-no-files-found: error

  release-package:
    name: Release package (${{ matrix.release_os }})
    runs-on: ${{ matrix.runner }}
    needs:
      - script-tests
    if: startsWith(github.ref, 'refs/tags/release-v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - release_os: windows
            runner: windows-latest
            archive: zip
          - release_os: macos
            runner: macos-latest
            archive: tar
          - release_os: linux
            runner: ubuntu-latest
            archive: tar
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/tui/package-lock.json

      - name: Install TUI dependencies
        run: npm ci
        working-directory: apps/tui

      - name: Install Linux system dependencies
        if: matrix.release_os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Tura dependencies (Windows)
        if: matrix.release_os == 'windows'
        shell: pwsh
        run: .\scripts\install.ps1

      - name: Install Tura dependencies (Unix)
        if: matrix.release_os != 'windows'
        run: sh scripts/install.sh

      - name: Build portable release (Windows)
        if: matrix.release_os == 'windows'
        shell: pwsh
        run: .\scripts\build-release.ps1

      - name: Build portable release (Unix)
        if: matrix.release_os != 'windows'
        run: sh scripts/build-release.sh

      - name: Stage release artifacts (Windows)
        if: matrix.release_os == 'windows'
        shell: pwsh
        run: |
          Remove-Item -LiteralPath release -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path release -Force | Out-Null
          foreach ($name in @(
            "tura.exe",
            "tura_exec.exe",
            "tura_gateway.exe",
            "tura_router.exe",
            "tura_session_db.exe",
            "tura_runtime.exe",
            "tura-command-read-media.exe",
            "tura-command-web-discover.exe"
          )) {
            Copy-Item -LiteralPath (Join-Path "target\release" $name) -Destination release -Force
          }
          Copy-Item -LiteralPath "target\release\gui" -Destination "release\gui" -Recurse -Force

      - name: Stage release artifacts (Unix)
        if: matrix.release_os != 'windows'
        run: |
          rm -rf release
          mkdir -p release
          for name in \
            tura \
            tura_exec \
            tura_gateway \
            tura_router \
            tura_session_db \
            tura_runtime \
            tura-command-read-media \
            tura-command-web-discover
          do
            cp "target/release/$name" release/
          done
          cp -R target/release/gui release/gui

      - name: Compress release directory (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path release -DestinationPath "tura-${{ github.ref_name }}-${{ matrix.release_os }}-release.zip" -Force

      - name: Compress release directory (Unix)
        if: matrix.archive == 'tar'
        run: tar -czf "tura-${GITHUB_REF_NAME}-${{ matrix.release_os }}-release.tar.gz" release

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: tura-${{ github.ref_name }}-${{ matrix.release_os }}-release
          path: |
            tura-${{ github.ref_name }}-${{ matrix.release_os }}-release.zip
            tura-${{ github.ref_name }}-${{ matrix.release_os }}-release.tar.gz
          if-no-files-found: error

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - source-package
      - release-package
    if: startsWith(github.ref, 'refs/tags/release-v')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-artifacts/*
