name: NPM Platform Release

on:
  push:
    branches:
      - "npm-release/**"
    tags:
      - "v*"
      - "release*"
      - "release-v*"
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  packages: write

concurrency:
  group: npm-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NPM_CLI_VERSION: "10.9.2"

jobs:
  validate-release:
    name: Validate release tag
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Verify release tag matches package version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $true
          }
          $version = node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version"
          $allowedTags = @("v$version", "release$version", "release-$version", "release-v$version")
          if ($env:GITHUB_REF_NAME -notin $allowedTags) {
            throw "Release tag $env:GITHUB_REF_NAME must match package version $version`: $($allowedTags -join ', ')."
          }
      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install pinned npm
        run: npm install --global "npm@${{ env.NPM_CLI_VERSION }}" --no-audit --no-fund
      - name: Validate npm token before platform builds
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN || secrets.NPM_AUTH_TOKEN }}
        shell: bash
        run: |
          set -o pipefail
          mkdir -p .release-logs
          exec > >(tee .release-logs/npm-token-validation.log) 2>&1
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error title=NPM token missing::Configure NPM_TOKEN, NODE_AUTH_TOKEN, or NPM_AUTH_TOKEN before publishing."
            exit 1
          fi
          if ! npm whoami --registry=https://registry.npmjs.org/; then
            echo "::error title=NPM token rejected::The configured npm token was rejected before platform builds started."
            exit 1
          fi
      - name: Upload npm token validation failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-token-validation-failure-${{ github.run_id }}
          path: .release-logs/npm-token-validation.log
          if-no-files-found: ignore

  build-platform:
    name: Build ${{ matrix.package }}
    needs: validate-release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    env:
      TURA_NPM_RELEASE_TAG: ${{ github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            package: tura-linux-x64
            install: sh scripts/install.sh --environment-only
            build: sh scripts/build-release.sh
          - runner: macos-15-intel
            package: tura-darwin-x64
            install: sh scripts/install.sh --environment-only
            build: sh scripts/build-release.sh
          - runner: macos-15
            package: tura-darwin-arm64
            install: sh scripts/install.sh --environment-only
            build: sh scripts/build-release.sh
          - runner: windows-2022
            package: tura-win32-x64
            install: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\install.ps1 -EnvironmentOnly
            build: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build-release.ps1

    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: npm-platform-${{ matrix.package }}
          cache-on-failure: true

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install pinned npm
        run: npm install --global "npm@${{ env.NPM_CLI_VERSION }}" --no-audit --no-fund

      - name: Bun setup
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            pkg-config

      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Build release artifacts
        run: ${{ matrix.build }}

      - name: Build npm platform package and release archive
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $true
          }
          node scripts/npm/prepack.mjs
          node scripts/npm/package-platform.mjs --pack
          node scripts/npm/package-release.mjs
          node scripts/npm/stage-desktop-release-assets.mjs
          $platformPackage = Get-ChildItem -LiteralPath release/npm-platform -Filter *.tgz -File | Select-Object -First 1
          if (-not $platformPackage) {
            $packageDir = Get-ChildItem -LiteralPath release/npm-platform -Directory | Select-Object -First 1
            if (-not $packageDir) { throw "Platform package directory was not produced." }
            npm pack $packageDir.FullName --json --pack-destination release/npm-platform | Out-Host
          }
          $platformPackage = Get-ChildItem -LiteralPath release/npm-platform -Filter *.tgz -File | Select-Object -First 1
          if (-not $platformPackage) { throw "Platform package tarball was not produced." }
          $version = node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version"
          $expectedPlatformPackage = Join-Path "release/npm-platform" "${{ matrix.package }}-$version.tgz"
          if (-not (Test-Path -LiteralPath $expectedPlatformPackage -PathType Leaf)) {
            throw "Expected platform package was not produced: $expectedPlatformPackage"
          }
          $releaseArchives = @(Get-ChildItem -LiteralPath release -Filter "tura-$env:GITHUB_REF_NAME-*" -File)
          if ($releaseArchives.Count -ne 1) {
            throw "Expected one platform release archive; found $($releaseArchives.Count)."
          }
          $desktopAssets = @(Get-ChildItem -LiteralPath release/desktop -File)
          if ($desktopAssets.Count -lt 1) {
            throw "No installable Tauri GUI asset was produced."
          }
          $publishDir = "release/publish"
          Remove-Item -LiteralPath $publishDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $publishDir -Force | Out-Null
          Copy-Item -LiteralPath $expectedPlatformPackage -Destination $publishDir
          Copy-Item -LiteralPath $releaseArchives[0].FullName -Destination $publishDir
          $desktopAssets | Copy-Item -Destination $publishDir

      - name: Verify npm install uses local platform package
        run: node scripts/npm/verify-platform-install.mjs

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.package }}
          path: release/publish/*
          if-no-files-found: error

  publish-platform:
    name: Publish platform npm packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-platform
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install pinned npm
        run: npm install --global "npm@${{ env.NPM_CLI_VERSION }}" --no-audit --no-fund
      - name: Download verified platform packages
        uses: actions/download-artifact@v4
        with:
          pattern: npm-tura-*
          path: release-assets
          merge-multiple: true
      - name: Publish platform npm packages
        shell: pwsh
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN || secrets.NPM_AUTH_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }
          if (-not $env:NODE_AUTH_TOKEN) {
            throw "No npm publish token is configured."
          }
          npm whoami --registry=https://registry.npmjs.org/
          if ($LASTEXITCODE -ne 0) {
            throw "The configured npm token was rejected with exit $LASTEXITCODE."
          }
          $version = node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version"
          $packageNames = @("tura-linux-x64", "tura-darwin-x64", "tura-darwin-arm64", "tura-win32-x64")
          foreach ($packageName in $packageNames) {
            $tarball = Join-Path "release-assets" "$packageName-$version.tgz"
            if (-not (Test-Path -LiteralPath $tarball -PathType Leaf)) {
              throw "Verified platform package was not downloaded: $tarball"
            }
          }
          foreach ($packageName in $packageNames) {
            $tarball = Join-Path "release-assets" "$packageName-$version.tgz"
            npm view "$packageName@$version" version *> $null
            $viewExitCode = $LASTEXITCODE
            $global:LASTEXITCODE = 0
            if ($viewExitCode -eq 0) {
              Write-Host "$packageName@$version already exists on npm; skipping publish."
              continue
            }
            npm publish $tarball --access public --provenance=false
            if ($LASTEXITCODE -ne 0) {
              throw "Publishing $packageName@$version failed with exit $LASTEXITCODE."
            }
          }

  publish-github-release:
    name: Publish GitHub Release assets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: publish-main
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download verified release assets
        uses: actions/download-artifact@v4
        with:
          pattern: npm-tura-*
          path: release-assets
          merge-multiple: true
      - name: Upload GitHub Release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }
          $tag = $env:GITHUB_REF_NAME
          $files = @(Get-ChildItem -LiteralPath release-assets -File)
          $version = $tag -replace '^release-v', '' -replace '^release-', '' -replace '^release', '' -replace '^v', ''
          $requiredNames = @(
            "tura-linux-x64-$version.tgz",
            "tura-darwin-x64-$version.tgz",
            "tura-darwin-arm64-$version.tgz",
            "tura-win32-x64-$version.tgz",
            "tura-$tag-linux-x64.tar.gz",
            "tura-$tag-macos-x64.tar.gz",
            "tura-$tag-macos-arm64.tar.gz",
            "tura-$tag-windows-x64.zip"
          )
          $missing = @($requiredNames | Where-Object { $_ -notin $files.Name })
          if ($missing.Count -gt 0) {
            throw "Verified release assets are missing: $($missing -join ', ')."
          }
          foreach ($platform in @("linux-x64", "macos-x64", "macos-arm64", "windows-x64")) {
            $prefix = "tura-gui-$tag-$platform"
            if (-not ($files.Name | Where-Object { $_.StartsWith($prefix, [System.StringComparison]::Ordinal) })) {
              throw "Verified release assets do not contain a Tauri installer for $platform."
            }
          }
          $assets = @($files | ForEach-Object { $_.FullName })
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --generate-notes
            if ($LASTEXITCODE -ne 0) {
              gh release view $tag *> $null
              if ($LASTEXITCODE -ne 0) { throw "GitHub Release $tag does not exist and could not be created." }
            }
          }
          gh release upload $tag @assets --clobber

  publish-main:
    name: Publish main npm package
    runs-on: ubuntu-latest
    needs: publish-platform
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install pinned npm
        run: npm install --global "npm@${{ env.NPM_CLI_VERSION }}" --no-audit --no-fund
      - name: Verify and publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN || secrets.NPM_AUTH_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error title=NPM token missing::No npm publish token is configured."
            exit 1
          fi
          npm whoami --registry=https://registry.npmjs.org/
          node scripts/npm/prepack.mjs
          package_name="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).name")"
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")"
          if npm view "${package_name}@${version}" version >/dev/null 2>&1; then
            echo "${package_name}@${version} already exists on npm; skipping publish."
            exit 0
          fi
          mkdir -p release/npm-main
          pack_json="$(npm pack --json --pack-destination release/npm-main)"
          package_file="$(PACK_JSON="$pack_json" node -e "const info = JSON.parse(process.env.PACK_JSON); console.log('release/npm-main/' + info[0].filename)")"
          npm publish "$package_file" --access public --provenance=false

  publish-github-package:
    name: Publish GitHub npm package
    runs-on: ubuntu-latest
    needs: publish-main
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@tura-ai"
      - name: Install npm
        run: npm install --global "npm@${{ env.NPM_CLI_VERSION }}" --no-audit --no-fund
      - name: Verify npmjs main package exists
        run: |
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")"
          npm view "tura-ai@${version}" version --registry https://registry.npmjs.org >/dev/null
      - name: Pack GitHub package
        env:
          TURA_NPM_PACKAGE_NAME: "@tura-ai/tura"
        run: |
          node scripts/npm/prepack.mjs
          node scripts/npm/stage-main-package.mjs
          trap 'node scripts/npm/restore-main-package.mjs' EXIT
          mkdir -p release/npm-github
          pack_json="$(npm pack --ignore-scripts --json --pack-destination release/npm-github)"
          PACK_JSON="$pack_json" node -e "const [info] = JSON.parse(process.env.PACK_JSON); if (info?.name !== process.env.TURA_NPM_PACKAGE_NAME) throw new Error('GitHub package name mismatch')"
      - name: Publish GitHub package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TURA_NPM_PACKAGE_NAME: "@tura-ai/tura"
        run: |
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")"
          if npm view "${TURA_NPM_PACKAGE_NAME}@${version}" version --registry https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "${TURA_NPM_PACKAGE_NAME}@${version} already exists in GitHub Packages; skipping publish."
            exit 0
          fi
          package_file="$(find release/npm-github -maxdepth 1 -name '*.tgz' -print -quit)"
          test -n "$package_file"
          npm publish "$package_file" --registry https://npm.pkg.github.com --access public --provenance=false

  validate-recovery:
    name: Validate publish-only recovery
    if: startsWith(github.ref, 'refs/heads/npm-release/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.source.outputs.tag }}
      run_id: ${{ steps.source.outputs.run_id }}
      tag_sha: ${{ steps.source.outputs.tag_sha }}
      version: ${{ steps.source.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate tag, source run, jobs, and artifacts
        id: source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .release-logs
          exec > >(tee .release-logs/recovery-validation.log) 2>&1

          recovery="${GITHUB_REF_NAME#npm-release/}"
          tag="${recovery%/*}"
          run_id="${recovery##*/}"
          if [ "$tag" = "$recovery" ] || [[ ! "$run_id" =~ ^[0-9]+$ ]]; then
            echo "::error title=Invalid recovery branch::Expected npm-release/<tag>/<source-run-id>."
            exit 1
          fi

          tag_sha="$(git rev-list -n 1 "$tag" 2>/dev/null || true)"
          if [ -z "$tag_sha" ]; then
            echo "::error title=Recovery tag missing::Tag $tag was not found."
            exit 1
          fi
          git show "$tag:package.json" > "$RUNNER_TEMP/recovery-package.json"
          version="$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).version" "$RUNNER_TEMP/recovery-package.json")"
          case "$tag" in
            "v$version"|"release$version"|"release-$version"|"release-v$version") ;;
            *)
              echo "::error title=Recovery tag mismatch::Tag $tag does not match package version $version."
              exit 1
              ;;
          esac

          run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}")"
          if ! jq -e \
            --arg tag "$tag" \
            --arg sha "$tag_sha" \
            '.status == "completed" and .path == ".github/workflows/npm-release.yml" and .event == "push" and .head_branch == $tag and .head_sha == $sha' \
            <<<"$run_json" >/dev/null; then
            echo "::error title=Invalid recovery source::Run $run_id is not a completed release run for $tag at $tag_sha."
            exit 1
          fi

          jobs_json="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" --slurp)"
          artifacts_json="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts?per_page=100" --slurp)"
          packages=(tura-linux-x64 tura-darwin-x64 tura-darwin-arm64 tura-win32-x64)
          for package in "${packages[@]}"; do
            if ! jq -e \
              --arg name "Build $package" \
              '[.[].jobs[] | select(.name == $name and .conclusion == "success")] | length == 1' \
              <<<"$jobs_json" >/dev/null; then
              echo "::error title=Unverified platform build::Run $run_id does not contain one successful Build $package job."
              exit 1
            fi
            if ! jq -e \
              --arg name "npm-$package" \
              --arg sha "$tag_sha" \
              '[.[].artifacts[] | select(.name == $name and .expired == false and .size_in_bytes > 0 and .workflow_run.head_sha == $sha)] | length == 1' \
              <<<"$artifacts_json" >/dev/null; then
              echo "::error title=Unverified platform artifact::Run $run_id does not contain one live npm-$package artifact for $tag_sha."
              exit 1
            fi
          done

          {
            echo "tag=$tag"
            echo "run_id=$run_id"
            echo "tag_sha=$tag_sha"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"
          echo "Validated recovery source run $run_id for $tag at $tag_sha."
      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install pinned npm
        run: npm install --global "npm@${{ env.NPM_CLI_VERSION }}" --no-audit --no-fund
      - name: Validate npm token before artifact download
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN || secrets.NPM_AUTH_TOKEN }}
        shell: bash
        run: |
          set -o pipefail
          exec > >(tee -a .release-logs/recovery-validation.log) 2>&1
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error title=NPM token missing::Configure NPM_TOKEN, NODE_AUTH_TOKEN, or NPM_AUTH_TOKEN before recovery."
            exit 1
          fi
          if ! npm whoami --registry=https://registry.npmjs.org/; then
            echo "::error title=NPM token rejected::The configured npm token was rejected before artifact download."
            exit 1
          fi
      - name: Upload recovery validation failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-recovery-validation-failure-${{ github.run_id }}
          path: .release-logs/recovery-validation.log
          if-no-files-found: ignore

  recover-release:
    name: Resume verified release publishing
    if: startsWith(github.ref, 'refs/heads/npm-release/')
    needs: validate-recovery
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-recovery.outputs.tag }}
      - name: Node setup for npmjs
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install pinned npm
        run: npm install --global "npm@${{ env.NPM_CLI_VERSION }}" --no-audit --no-fund
      - name: Download verified source-run artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-tura-*
          path: release-assets
          merge-multiple: true
          run-id: ${{ needs.validate-recovery.outputs.run_id }}
          github-token: ${{ github.token }}
      - name: Verify downloaded release assets
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.validate-recovery.outputs.tag }}
          RELEASE_VERSION: ${{ needs.validate-recovery.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $files = @(Get-ChildItem -LiteralPath release-assets -File)
          $requiredNames = @(
            "tura-linux-x64-$env:RELEASE_VERSION.tgz",
            "tura-darwin-x64-$env:RELEASE_VERSION.tgz",
            "tura-darwin-arm64-$env:RELEASE_VERSION.tgz",
            "tura-win32-x64-$env:RELEASE_VERSION.tgz",
            "tura-$env:RELEASE_TAG-linux-x64.tar.gz",
            "tura-$env:RELEASE_TAG-macos-x64.tar.gz",
            "tura-$env:RELEASE_TAG-macos-arm64.tar.gz",
            "tura-$env:RELEASE_TAG-windows-x64.zip"
          )
          $missing = @($requiredNames | Where-Object { $_ -notin $files.Name })
          if ($missing.Count -gt 0) {
            throw "Downloaded release assets are missing: $($missing -join ', ')."
          }
          foreach ($platform in @("linux-x64", "macos-x64", "macos-arm64", "windows-x64")) {
            $prefix = "tura-gui-$env:RELEASE_TAG-$platform"
            if (-not ($files.Name | Where-Object { $_.StartsWith($prefix, [System.StringComparison]::Ordinal) })) {
              throw "Downloaded release assets do not contain a Tauri installer for $platform."
            }
          }
      - name: Publish platform npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN || secrets.NPM_AUTH_TOKEN }}
          RELEASE_VERSION: ${{ needs.validate-recovery.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .release-logs
          log=.release-logs/recovery-platform-npm.log
          exec > >(tee "$log") 2>&1
          trap 'status=$?; if [ "$status" -ne 0 ]; then tail_output="$(tail -n 40 "$log")"; tail_output="${tail_output//'%'/'%25'}"; tail_output="${tail_output//$'\r'/'%0D'}"; tail_output="${tail_output//$'\n'/'%0A'}"; echo "::error title=Platform npm recovery failed::$tail_output"; fi; exit "$status"' EXIT

          npm whoami --registry=https://registry.npmjs.org/
          packages=(tura-linux-x64 tura-darwin-x64 tura-darwin-arm64 tura-win32-x64)
          for package in "${packages[@]}"; do
            tarball="release-assets/$package-$RELEASE_VERSION.tgz"
            status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "https://registry.npmjs.org/$package/$RELEASE_VERSION")"
            case "$status" in
              200) echo "$package@$RELEASE_VERSION already exists on npm; skipping publish." ;;
              404) npm publish "$tarball" --access public --provenance=false ;;
              *) echo "Unexpected npm registry status $status for $package@$RELEASE_VERSION."; exit 1 ;;
            esac
            test "$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "https://registry.npmjs.org/$package/$RELEASE_VERSION")" = 200
            local_integrity="$(node -e "const fs=require('fs'),crypto=require('crypto'); const data=fs.readFileSync(process.argv[1]); console.log('sha512-'+crypto.createHash('sha512').update(data).digest('base64'))" "$tarball")"
            registry_integrity="$(npm view "$package@$RELEASE_VERSION" dist.integrity --registry https://registry.npmjs.org/)"
            test "$local_integrity" = "$registry_integrity"
          done
      - name: Pack and publish main npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN || secrets.NPM_AUTH_TOKEN }}
          RELEASE_VERSION: ${{ needs.validate-recovery.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          log=.release-logs/recovery-main-npm.log
          exec > >(tee "$log") 2>&1
          trap 'status=$?; if [ "$status" -ne 0 ]; then node scripts/npm/restore-main-package.mjs || true; tail_output="$(tail -n 40 "$log")"; tail_output="${tail_output//'%'/'%25'}"; tail_output="${tail_output//$'\r'/'%0D'}"; tail_output="${tail_output//$'\n'/'%0A'}"; echo "::error title=Main npm recovery failed::$tail_output"; fi; exit "$status"' EXIT

          npm whoami --registry=https://registry.npmjs.org/
          node scripts/npm/prepack.mjs
          mkdir -p release/npm-main
          pack_json="$(npm pack --json --pack-destination release/npm-main)"
          package_file="$(PACK_JSON="$pack_json" node -e "const [info] = JSON.parse(process.env.PACK_JSON); console.log('release/npm-main/' + info.filename)")"
          status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "https://registry.npmjs.org/tura-ai/$RELEASE_VERSION")"
          case "$status" in
            200) echo "tura-ai@$RELEASE_VERSION already exists on npm; skipping publish." ;;
            404) npm publish "$package_file" --access public --provenance=false ;;
            *) echo "Unexpected npm registry status $status for tura-ai@$RELEASE_VERSION."; exit 1 ;;
          esac
          test "$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "https://registry.npmjs.org/tura-ai/$RELEASE_VERSION")" = 200
          local_integrity="$(node -e "const fs=require('fs'),crypto=require('crypto'); const data=fs.readFileSync(process.argv[1]); console.log('sha512-'+crypto.createHash('sha512').update(data).digest('base64'))" "$package_file")"
          registry_integrity="$(npm view "tura-ai@$RELEASE_VERSION" dist.integrity --registry https://registry.npmjs.org/)"
          test "$local_integrity" = "$registry_integrity"
      - name: Upload GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-recovery.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          log=.release-logs/recovery-github-release.log
          exec > >(tee "$log") 2>&1
          trap 'status=$?; if [ "$status" -ne 0 ]; then tail_output="$(tail -n 40 "$log")"; tail_output="${tail_output//'%'/'%25'}"; tail_output="${tail_output//$'\r'/'%0D'}"; tail_output="${tail_output//$'\n'/'%0A'}"; echo "::error title=GitHub Release recovery failed::$tail_output"; fi; exit "$status"' EXIT

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          fi
          mapfile -t assets < <(find release-assets -maxdepth 1 -type f -print | sort)
          test "${#assets[@]}" -gt 0
          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
      - name: Node setup for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@tura-ai"
      - name: Pack and publish GitHub npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TURA_NPM_PACKAGE_NAME: "@tura-ai/tura"
          RELEASE_VERSION: ${{ needs.validate-recovery.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          log=.release-logs/recovery-github-package.log
          exec > >(tee "$log") 2>&1
          trap 'status=$?; node scripts/npm/restore-main-package.mjs || true; if [ "$status" -ne 0 ]; then tail_output="$(tail -n 40 "$log")"; tail_output="${tail_output//'%'/'%25'}"; tail_output="${tail_output//$'\r'/'%0D'}"; tail_output="${tail_output//$'\n'/'%0A'}"; echo "::error title=GitHub Package recovery failed::$tail_output"; fi; exit "$status"' EXIT

          npm view "tura-ai@$RELEASE_VERSION" version --registry https://registry.npmjs.org >/dev/null
          node scripts/npm/prepack.mjs
          node scripts/npm/stage-main-package.mjs
          mkdir -p release/npm-github
          pack_json="$(npm pack --ignore-scripts --json --pack-destination release/npm-github)"
          PACK_JSON="$pack_json" node -e "const [info] = JSON.parse(process.env.PACK_JSON); if (info?.name !== process.env.TURA_NPM_PACKAGE_NAME) throw new Error('GitHub package name mismatch')"
          package_file="$(PACK_JSON="$pack_json" node -e "const [info] = JSON.parse(process.env.PACK_JSON); console.log('release/npm-github/' + info.filename)")"
          if npm view "${TURA_NPM_PACKAGE_NAME}@$RELEASE_VERSION" version --registry https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "${TURA_NPM_PACKAGE_NAME}@$RELEASE_VERSION already exists in GitHub Packages; skipping publish."
          else
            npm publish "$package_file" --registry https://npm.pkg.github.com --access public --provenance=false
          fi
          npm view "${TURA_NPM_PACKAGE_NAME}@$RELEASE_VERSION" version --registry https://npm.pkg.github.com >/dev/null
          local_integrity="$(node -e "const fs=require('fs'),crypto=require('crypto'); const data=fs.readFileSync(process.argv[1]); console.log('sha512-'+crypto.createHash('sha512').update(data).digest('base64'))" "$package_file")"
          registry_integrity="$(npm view "${TURA_NPM_PACKAGE_NAME}@$RELEASE_VERSION" dist.integrity --registry https://npm.pkg.github.com/)"
          test "$local_integrity" = "$registry_integrity"
      - name: Verify recovered release
        env:
          GH_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.validate-recovery.outputs.tag }}
          RELEASE_VERSION: ${{ needs.validate-recovery.outputs.version }}
          TAG_SHA: ${{ needs.validate-recovery.outputs.tag_sha }}
        shell: bash
        run: |
          set -euo pipefail
          log=.release-logs/recovery-verification.log
          exec > >(tee "$log") 2>&1
          packages=(tura-ai tura-linux-x64 tura-darwin-x64 tura-darwin-arm64 tura-win32-x64)
          for package in "${packages[@]}"; do
            test "$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "https://registry.npmjs.org/$package/$RELEASE_VERSION")" = 200
          done
          npm view "@tura-ai/tura@$RELEASE_VERSION" version --registry https://npm.pkg.github.com >/dev/null
          test "$(git rev-parse HEAD)" = "$TAG_SHA"
          asset_names="$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')"
          for required in \
            "tura-linux-x64-$RELEASE_VERSION.tgz" \
            "tura-darwin-x64-$RELEASE_VERSION.tgz" \
            "tura-darwin-arm64-$RELEASE_VERSION.tgz" \
            "tura-win32-x64-$RELEASE_VERSION.tgz" \
            "tura-$RELEASE_TAG-linux-x64.tar.gz" \
            "tura-$RELEASE_TAG-macos-x64.tar.gz" \
            "tura-$RELEASE_TAG-macos-arm64.tar.gz" \
            "tura-$RELEASE_TAG-windows-x64.zip"; do
            grep -Fxq "$required" <<<"$asset_names"
          done
          for platform in linux-x64 macos-x64 macos-arm64 windows-x64; do
            grep -Eq "^tura-gui-$RELEASE_TAG-$platform" <<<"$asset_names"
          done
          echo "Recovered release $RELEASE_TAG is complete."
      - name: Upload recovery failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-recovery-failure-logs-${{ github.run_id }}
          path: .release-logs/*.log
          if-no-files-found: ignore
