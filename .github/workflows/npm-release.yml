name: NPM Platform Release

on:
  push:
    tags:
      - "v*"
      - "release*"
      - "release-v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  validate-npm-token:
    name: Validate npm token
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN || secrets.NPM_AUTH_TOKEN }}
    steps:
      - name: Check npm publish token
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "Skipping npm token check for non-tag workflow run."
            exit 0
          fi
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error title=NPM token missing::Configure one repository secret named NPM_TOKEN, NODE_AUTH_TOKEN, or NPM_AUTH_TOKEN before publishing to npm." >&2
            exit 1
          fi
          printf '%s\n' \
            "registry=https://registry.npmjs.org/" \
            "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          if ! npm whoami --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "::error title=NPM token invalid::The configured npm token is not accepted by registry.npmjs.org. Use a current granular access token with read/write publish permission and bypass 2FA enabled, or configure npm trusted publishing." >&2
            exit 1
          fi

  build-platform:
    name: Build ${{ matrix.package }}
    needs: validate-npm-token
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            package: tura-linux-x64
            install: sh scripts/install.sh
            build: sh scripts/build-release.sh --skip-tauri
          - runner: macos-15-intel
            package: tura-darwin-x64
            install: sh scripts/install.sh
            build: sh scripts/build-release.sh --skip-tauri
          - runner: macos-15
            package: tura-darwin-arm64
            install: sh scripts/install.sh
            build: sh scripts/build-release.sh --skip-tauri
          - runner: windows-2022
            package: tura-win32-x64
            install: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\install.ps1
            build: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build-release.ps1 -SkipTauri

    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: npm-platform-${{ matrix.package }}
          cache-on-failure: true

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Bun setup
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config

      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Run Rust tests
        run: cargo test --workspace --exclude tura_gui -- --test-threads=1

      - name: Build release artifacts
        run: ${{ matrix.build }}

      - name: Build npm platform package and release archive
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          node scripts/npm/prepack.mjs
          node scripts/npm/package-platform.mjs --pack --no-desktop
          node scripts/npm/package-release.mjs --no-desktop
          $platformPackage = Get-ChildItem -LiteralPath release/npm-platform -Filter *.tgz -File | Select-Object -First 1
          if (-not $platformPackage) {
            $packageDir = Get-ChildItem -LiteralPath release/npm-platform -Directory | Select-Object -First 1
            if (-not $packageDir) { throw "Platform package directory was not produced." }
            npm pack $packageDir.FullName --json --pack-destination release/npm-platform | Out-Host
          }
          $platformPackage = Get-ChildItem -LiteralPath release/npm-platform -Filter *.tgz -File | Select-Object -First 1
          if (-not $platformPackage) { throw "Platform package tarball was not produced." }

      - name: Verify npm install uses local platform package
        run: node scripts/npm/verify-platform-install.mjs

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.package }}
          path: |
            release/npm-platform/*.tgz
            release/tura-*
          if-no-files-found: error

      - name: Upload GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:GITHUB_REF_NAME
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --generate-notes
            if ($LASTEXITCODE -ne 0) {
              gh release view $tag *> $null
              if ($LASTEXITCODE -ne 0) { throw "GitHub Release $tag does not exist and could not be created." }
            }
          }
          $assets = @(
            Get-ChildItem -LiteralPath release/npm-platform -Filter *.tgz | ForEach-Object { $_.FullName }
            Get-ChildItem -LiteralPath release -File | ForEach-Object { $_.FullName }
          )
          gh release upload $tag @assets --clobber

      - name: Publish platform npm package
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN || secrets.NPM_AUTH_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }
          if (-not $env:NODE_AUTH_TOKEN) {
            Write-Host "::error title=NPM token missing::Configure one repository secret named NPM_TOKEN, NODE_AUTH_TOKEN, or NPM_AUTH_TOKEN before publishing to npm."
            exit 1
          }
          $packageDir = Get-ChildItem -LiteralPath release/npm-platform -Directory | Select-Object -First 1
          if (-not $packageDir) { throw "Platform package directory was not produced." }
          $packageJson = Get-Content -LiteralPath (Join-Path $packageDir.FullName "package.json") -Raw | ConvertFrom-Json
          npm view "$($packageJson.name)@$($packageJson.version)" version *> $null
          $viewExitCode = $LASTEXITCODE
          $global:LASTEXITCODE = 0
          if ($viewExitCode -eq 0) {
            Write-Host "$($packageJson.name)@$($packageJson.version) already exists on npm; skipping publish."
            exit 0
          }
          npm publish $packageDir.FullName --access public --provenance

  publish-main:
    name: Publish main npm package
    runs-on: ubuntu-latest
    needs: build-platform
    if: startsWith(github.ref, 'refs/tags/')
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN || secrets.NPM_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Verify and publish main package
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error title=NPM token missing::Configure one repository secret named NPM_TOKEN, NODE_AUTH_TOKEN, or NPM_AUTH_TOKEN before publishing to npm." >&2
            exit 1
          fi
          node scripts/npm/prepack.mjs
          package_name="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).name")"
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")"
          if npm view "${package_name}@${version}" version >/dev/null 2>&1; then
            echo "${package_name}@${version} already exists on npm; skipping publish."
            exit 0
          fi
          mkdir -p release/npm-main
          pack_json="$(npm pack --json --pack-destination release/npm-main)"
          package_file="$(PACK_JSON="$pack_json" node -e "const info = JSON.parse(process.env.PACK_JSON); console.log('release/npm-main/' + info[0].filename)")"
          npm publish "$package_file" --access public --provenance
