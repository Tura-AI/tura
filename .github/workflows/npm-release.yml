name: NPM Platform Release

on:
  push:
    tags:
      - "v*"
      - "release*"
      - "release-v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-platform:
    name: Build ${{ matrix.package }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            package: tura-linux-x64
            install: sh scripts/install.sh
            build: sh scripts/build-release.sh --skip-tauri
          - runner: macos-13
            package: tura-darwin-x64
            install: sh scripts/install.sh
            build: sh scripts/build-release.sh --skip-tauri
          - runner: macos-14
            package: tura-darwin-arm64
            install: sh scripts/install.sh
            build: sh scripts/build-release.sh --skip-tauri
          - runner: windows-2022
            package: tura-win32-x64
            install: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\install.ps1
            build: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build-release.ps1 -SkipTauri

    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: npm-platform-${{ matrix.package }}
          cache-on-failure: true

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Bun setup
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config

      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Build release artifacts
        run: ${{ matrix.build }}

      - name: Build npm platform package and release archive
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          node scripts/npm/prepack.mjs
          node scripts/npm/package-platform.mjs --pack --no-desktop
          node scripts/npm/package-release.mjs --no-desktop

      - name: Verify npm install uses local platform package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = (Resolve-Path .).Path
          New-Item -ItemType Directory -Path release/npm-main -Force | Out-Null
          $platformPackage = Get-ChildItem -LiteralPath release/npm-platform -Filter *.tgz | Select-Object -First 1
          if (-not $platformPackage) { throw "Platform package tarball was not produced." }
          $mainPackJson = npm pack --json --pack-destination release/npm-main | ConvertFrom-Json
          $mainPackage = Join-Path $root (Join-Path "release/npm-main" $mainPackJson[0].filename)
          $platformInstallDir = Join-Path $env:RUNNER_TEMP "tura-platform-package-check"
          $installDir = Join-Path $env:RUNNER_TEMP "tura-npm-install-check"
          if (Test-Path -LiteralPath $platformInstallDir) { Remove-Item -LiteralPath $platformInstallDir -Recurse -Force }
          if (Test-Path -LiteralPath $installDir) { Remove-Item -LiteralPath $installDir -Recurse -Force }
          New-Item -ItemType Directory -Path $platformInstallDir | Out-Null
          New-Item -ItemType Directory -Path $installDir | Out-Null
          Push-Location $platformInstallDir
          try {
            npm init -y --silent | Out-Null
            npm install $platformPackage.FullName | Out-Null
            $platformPackageDir = Get-ChildItem -LiteralPath (Join-Path $platformInstallDir "node_modules") -Directory -Filter "tura-*" | Select-Object -First 1
            if (-not $platformPackageDir) { throw "Installed platform package directory was not found." }
          } finally {
            Pop-Location
          }
          Push-Location $installDir
          try {
            npm init -y --silent | Out-Null
            $env:TURA_NPM_PLATFORM_PACKAGE_DIR = $platformPackageDir.FullName
            npm install --foreground-scripts --omit=optional $mainPackage
            $binName = if ($IsWindows) { "tura.cmd" } else { "tura" }
            $turaBin = Join-Path $installDir (Join-Path "node_modules/.bin" $binName)
            if (-not (Test-Path -LiteralPath $turaBin)) { throw "Installed tura bin was not found: $turaBin" }
            $PSNativeCommandUseErrorActionPreference = $false
            $helpOutput = & $turaBin exec --help 2>&1
            if ($LASTEXITCODE -ne 0) {
              $helpOutput | Select-Object -First 40 | ForEach-Object { Write-Host $_ }
              throw "$turaBin exec --help failed with exit $LASTEXITCODE"
            }
            $helpText = $helpOutput -join "`n"
            if (-not $helpText.Contains("Tura Rust CLI")) {
              $helpOutput | Select-Object -First 40 | ForEach-Object { Write-Host $_ }
              throw "$turaBin exec --help did not return the Rust CLI help text."
            }
            $helpOutput | Select-Object -First 8 | ForEach-Object { Write-Host $_ }
          } finally {
            Remove-Item Env:\TURA_NPM_PLATFORM_PACKAGE_DIR -ErrorAction SilentlyContinue
            Pop-Location
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.package }}
          path: |
            release/npm-platform/*.tgz
            release/tura-*
          if-no-files-found: error

      - name: Upload GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:GITHUB_REF_NAME
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --generate-notes
            if ($LASTEXITCODE -ne 0) {
              gh release view $tag *> $null
              if ($LASTEXITCODE -ne 0) { throw "GitHub Release $tag does not exist and could not be created." }
            }
          }
          $assets = @(
            Get-ChildItem -LiteralPath release/npm-platform -Filter *.tgz | ForEach-Object { $_.FullName }
            Get-ChildItem -LiteralPath release -File | ForEach-Object { $_.FullName }
          )
          gh release upload $tag @assets --clobber

      - name: Publish platform npm package
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          if (-not $env:NODE_AUTH_TOKEN) {
            throw "NPM_TOKEN is not configured; cannot publish platform npm package."
          }
          $packageDir = Get-ChildItem -LiteralPath release/npm-platform -Directory | Select-Object -First 1
          if (-not $packageDir) { throw "Platform package directory was not produced." }
          $packageJson = Get-Content -LiteralPath (Join-Path $packageDir.FullName "package.json") -Raw | ConvertFrom-Json
          npm view "$($packageJson.name)@$($packageJson.version)" version *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "$($packageJson.name)@$($packageJson.version) already exists on npm; skipping publish."
            exit 0
          }
          npm publish $packageDir.FullName --access public --provenance

  publish-main:
    name: Publish main npm package
    runs-on: ubuntu-latest
    needs: build-platform
    if: startsWith(github.ref, 'refs/tags/')
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Verify and publish main package
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is not configured; cannot publish main npm package." >&2
            exit 1
          fi
          node scripts/npm/prepack.mjs
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")"
          if npm view "tura@${version}" version >/dev/null 2>&1; then
            echo "tura@${version} already exists on npm; skipping publish."
            exit 0
          fi
          npm publish --access public --provenance
