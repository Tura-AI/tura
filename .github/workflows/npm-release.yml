name: NPM Platform Release

on:
  push:
    branches:
      - "npm-release/**"
    tags:
      - "v*"
      - "release*"
      - "release-v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

env:
  NPM_CLI_VERSION: "11.18.0"

jobs:
  validate-release:
    name: Validate release tag
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Verify release tag matches package version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $true
          }
          $version = node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version"
          $allowedTags = @("v$version", "release$version", "release-$version", "release-v$version")
          if ($env:GITHUB_REF_NAME -notin $allowedTags) {
            throw "Release tag $env:GITHUB_REF_NAME must match package version $version`: $($allowedTags -join ', ')."
          }

  build-platform:
    name: Build ${{ matrix.package }}
    needs: validate-release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    env:
      TURA_NPM_RELEASE_TAG: ${{ github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            package: tura-linux-x64
            install: sh scripts/install.sh --environment-only
            build: sh scripts/build-release.sh
          - runner: macos-15-intel
            package: tura-darwin-x64
            install: sh scripts/install.sh --environment-only
            build: sh scripts/build-release.sh
          - runner: macos-15
            package: tura-darwin-arm64
            install: sh scripts/install.sh --environment-only
            build: sh scripts/build-release.sh
          - runner: windows-2022
            package: tura-win32-x64
            install: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\install.ps1 -EnvironmentOnly
            build: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build-release.ps1

    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: npm-platform-${{ matrix.package }}
          cache-on-failure: true

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install npm with trusted publishing support
        run: npm install --global "npm@${{ env.NPM_CLI_VERSION }}" --no-audit --no-fund

      - name: Bun setup
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            pkg-config

      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Build release artifacts
        run: ${{ matrix.build }}

      - name: Build npm platform package and release archive
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $true
          }
          node scripts/npm/prepack.mjs
          node scripts/npm/package-platform.mjs --pack
          node scripts/npm/package-release.mjs
          node scripts/npm/stage-desktop-release-assets.mjs
          $platformPackage = Get-ChildItem -LiteralPath release/npm-platform -Filter *.tgz -File | Select-Object -First 1
          if (-not $platformPackage) {
            $packageDir = Get-ChildItem -LiteralPath release/npm-platform -Directory | Select-Object -First 1
            if (-not $packageDir) { throw "Platform package directory was not produced." }
            npm pack $packageDir.FullName --json --pack-destination release/npm-platform | Out-Host
          }
          $platformPackage = Get-ChildItem -LiteralPath release/npm-platform -Filter *.tgz -File | Select-Object -First 1
          if (-not $platformPackage) { throw "Platform package tarball was not produced." }
          $version = node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version"
          $expectedPlatformPackage = Join-Path "release/npm-platform" "${{ matrix.package }}-$version.tgz"
          if (-not (Test-Path -LiteralPath $expectedPlatformPackage -PathType Leaf)) {
            throw "Expected platform package was not produced: $expectedPlatformPackage"
          }
          $releaseArchives = @(Get-ChildItem -LiteralPath release -Filter "tura-$env:GITHUB_REF_NAME-*" -File)
          if ($releaseArchives.Count -ne 1) {
            throw "Expected one platform release archive; found $($releaseArchives.Count)."
          }
          $desktopAssets = @(Get-ChildItem -LiteralPath release/desktop -File)
          if ($desktopAssets.Count -lt 1) {
            throw "No installable Tauri GUI asset was produced."
          }
          $publishDir = "release/publish"
          Remove-Item -LiteralPath $publishDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $publishDir -Force | Out-Null
          Copy-Item -LiteralPath $expectedPlatformPackage -Destination $publishDir
          Copy-Item -LiteralPath $releaseArchives[0].FullName -Destination $publishDir
          $desktopAssets | Copy-Item -Destination $publishDir

      - name: Verify npm install uses local platform package
        run: node scripts/npm/verify-platform-install.mjs

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.package }}
          path: release/publish/*
          if-no-files-found: error

  publish-platform:
    name: Publish platform npm packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-platform
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install npm with trusted publishing support
        run: npm install --global "npm@${{ env.NPM_CLI_VERSION }}" --no-audit --no-fund
      - name: Download verified platform packages
        uses: actions/download-artifact@v4
        with:
          pattern: npm-tura-*
          path: release-assets
          merge-multiple: true
      - name: Publish platform npm packages
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }
          $version = node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version"
          $packageNames = @("tura-linux-x64", "tura-darwin-x64", "tura-darwin-arm64", "tura-win32-x64")
          foreach ($packageName in $packageNames) {
            $tarball = Join-Path "release-assets" "$packageName-$version.tgz"
            if (-not (Test-Path -LiteralPath $tarball -PathType Leaf)) {
              throw "Verified platform package was not downloaded: $tarball"
            }
          }
          foreach ($packageName in $packageNames) {
            $tarball = Join-Path "release-assets" "$packageName-$version.tgz"
            npm view "$packageName@$version" version *> $null
            $viewExitCode = $LASTEXITCODE
            $global:LASTEXITCODE = 0
            if ($viewExitCode -eq 0) {
              Write-Host "$packageName@$version already exists on npm; skipping publish."
              continue
            }
            npm publish $tarball --access public
            if ($LASTEXITCODE -ne 0) {
              throw "Publishing $packageName@$version failed with exit $LASTEXITCODE."
            }
          }

  publish-github-release:
    name: Publish GitHub Release assets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: publish-main
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download verified release assets
        uses: actions/download-artifact@v4
        with:
          pattern: npm-tura-*
          path: release-assets
          merge-multiple: true
      - name: Upload GitHub Release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }
          $tag = $env:GITHUB_REF_NAME
          $files = @(Get-ChildItem -LiteralPath release-assets -File)
          $version = $tag -replace '^release-v', '' -replace '^release-', '' -replace '^release', '' -replace '^v', ''
          $requiredNames = @(
            "tura-linux-x64-$version.tgz",
            "tura-darwin-x64-$version.tgz",
            "tura-darwin-arm64-$version.tgz",
            "tura-win32-x64-$version.tgz",
            "tura-$tag-linux-x64.tar.gz",
            "tura-$tag-macos-x64.tar.gz",
            "tura-$tag-macos-arm64.tar.gz",
            "tura-$tag-windows-x64.zip"
          )
          $missing = @($requiredNames | Where-Object { $_ -notin $files.Name })
          if ($missing.Count -gt 0) {
            throw "Verified release assets are missing: $($missing -join ', ')."
          }
          foreach ($platform in @("linux-x64", "macos-x64", "macos-arm64", "windows-x64")) {
            $prefix = "tura-gui-$tag-$platform"
            if (-not ($files.Name | Where-Object { $_.StartsWith($prefix, [System.StringComparison]::Ordinal) })) {
              throw "Verified release assets do not contain a Tauri installer for $platform."
            }
          }
          $assets = @($files | ForEach-Object { $_.FullName })
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --generate-notes
            if ($LASTEXITCODE -ne 0) {
              gh release view $tag *> $null
              if ($LASTEXITCODE -ne 0) { throw "GitHub Release $tag does not exist and could not be created." }
            }
          }
          gh release upload $tag @assets --clobber

  publish-main:
    name: Publish main npm package
    runs-on: ubuntu-latest
    needs: publish-platform
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install npm with trusted publishing support
        run: npm install --global "npm@${{ env.NPM_CLI_VERSION }}" --no-audit --no-fund
      - name: Verify and publish main package
        run: |
          node scripts/npm/prepack.mjs
          package_name="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).name")"
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")"
          if npm view "${package_name}@${version}" version >/dev/null 2>&1; then
            echo "${package_name}@${version} already exists on npm; skipping publish."
            exit 0
          fi
          mkdir -p release/npm-main
          pack_json="$(npm pack --json --pack-destination release/npm-main)"
          package_file="$(PACK_JSON="$pack_json" node -e "const info = JSON.parse(process.env.PACK_JSON); console.log('release/npm-main/' + info[0].filename)")"
          npm publish "$package_file" --access public

  publish-github-package:
    name: Publish GitHub npm package
    runs-on: ubuntu-latest
    needs: publish-main
    if: >-
      ${{ always() &&
      ((startsWith(github.ref, 'refs/tags/') && needs.publish-main.result == 'success') ||
      startsWith(github.ref, 'refs/heads/npm-release/')) }}
    steps:
      - uses: actions/checkout@v4
      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@tura-ai"
      - name: Install npm
        run: npm install --global "npm@${{ env.NPM_CLI_VERSION }}" --no-audit --no-fund
      - name: Verify npmjs main package exists
        run: |
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")"
          npm view "tura-ai@${version}" version --registry https://registry.npmjs.org >/dev/null
      - name: Pack GitHub package
        env:
          TURA_NPM_PACKAGE_NAME: "@tura-ai/tura"
        run: |
          node scripts/npm/prepack.mjs
          node scripts/npm/stage-main-package.mjs
          trap 'node scripts/npm/restore-main-package.mjs' EXIT
          mkdir -p release/npm-github
          pack_json="$(npm pack --ignore-scripts --json --pack-destination release/npm-github)"
          PACK_JSON="$pack_json" node -e "const [info] = JSON.parse(process.env.PACK_JSON); if (info?.name !== process.env.TURA_NPM_PACKAGE_NAME) throw new Error('GitHub package name mismatch')"
      - name: Publish GitHub package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TURA_NPM_PACKAGE_NAME: "@tura-ai/tura"
        run: |
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")"
          if npm view "${TURA_NPM_PACKAGE_NAME}@${version}" version --registry https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "${TURA_NPM_PACKAGE_NAME}@${version} already exists in GitHub Packages; skipping publish."
            exit 0
          fi
          package_file="$(find release/npm-github -maxdepth 1 -name '*.tgz' -print -quit)"
          test -n "$package_file"
          npm publish "$package_file" --registry https://npm.pkg.github.com --access public --provenance=false
