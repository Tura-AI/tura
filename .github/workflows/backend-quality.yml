name: Backend Quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend-quality:
    name: Backend quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt,rust-analyzer

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install backend quality tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny,typos-cli

      - name: Run backend quality checks
        run: sh scripts/check-backend-quality.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/tui/package-lock.json

      - name: Install TUI dependencies
        run: npm ci
        working-directory: apps/tui

      - name: Run TUI TypeScript checks
        run: npm run check
        working-directory: apps/tui

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install GUI dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/gui

      - name: Run GUI TypeScript checks
        run: bun run check
        working-directory: apps/gui
