name: Scripts Install Release

on:
  push:
    branches: ["**"]
    paths:
      - ".github/workflows/scripts-install-release.yml"
      - "scripts/**"
      - "commands/**/install.*"
      - "commands/**/requirements.txt"
      - "commands/**/pyproject.toml"
      - "commands/**/src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
  pull_request:
    branches: ["**"]
    paths:
      - ".github/workflows/scripts-install-release.yml"
      - "scripts/**"
      - "commands/**/install.*"
      - "commands/**/requirements.txt"
      - "commands/**/pyproject.toml"
      - "commands/**/src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
  workflow_dispatch:
    inputs:
      release_probe:
        description: "Dry-run release detector. Must look like release-v0.0.0 or release-v0.0.0-ci."
        required: true
        default: "release-v0.0.0-ci"
      build_tui:
        description: "Build GUI/TUI release artifacts in addition to Rust release binaries."
        required: true
        default: false
        type: boolean

concurrency:
  group: scripts-install-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scripts-install-release:
    name: Scripts install/build release (${{ matrix.os_name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: windows
            runner: windows-latest
          - os_name: macos
            runner: macos-latest
          - os_name: linux
            runner: ubuntu-latest
    env:
      TURA_RELEASE_PROBE: ${{ github.event.inputs.release_probe || 'release-v0.0.0-ci' }}
      TURA_BUILD_TUI: ${{ github.event.inputs.build_tui || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: scripts-install-release-${{ matrix.os_name }}

      - name: Install Linux system dependencies
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev

      - name: Run install script tests (Windows)
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: .\scripts\tests\scripts\test-install.ps1 -Full

      - name: Run install script tests (Unix)
        if: matrix.os_name != 'windows'
        run: sh scripts/tests/scripts/test-install.sh --full

      - name: Run build-release script tests (Windows)
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          if ($env:TURA_BUILD_TUI -ne "true") {
            .\scripts\tests\scripts\test-build-release.ps1 -ReleaseProbe $env:TURA_RELEASE_PROBE -SkipTui
          } else {
            .\scripts\tests\scripts\test-build-release.ps1 -ReleaseProbe $env:TURA_RELEASE_PROBE
          }

      - name: Run build-release script tests (Unix)
        if: matrix.os_name != 'windows'
        run: |
          args="--release-probe $TURA_RELEASE_PROBE"
          if [ "$TURA_BUILD_TUI" != "true" ]; then
            args="$args --skip-tui"
          fi
          # shellcheck disable=SC2086
          sh scripts/tests/scripts/test-build-release.sh $args
