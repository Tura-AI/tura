name: Windows Install

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean-install:
    name: Clean install ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        runner:
          - windows-2022
          - windows-2025
    steps:
      - uses: actions/checkout@v4

      - name: Verify clean checkout has no command virtual environments
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -LiteralPath commands -Directory | ForEach-Object {
            $venv = Join-Path $_.FullName ".venv"
            if (Test-Path -LiteralPath $venv) {
              throw "Unexpected command virtual environment in clean checkout: $venv"
            }
          }

      - name: Run Windows install script tests
        id: install
        shell: powershell
        continue-on-error: true
        run: |
          $ErrorActionPreference = "Continue"
          New-Item -ItemType Directory -Path .ci-results -Force | Out-Null
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\tests\scripts\test-install.ps1 -SkipApps *>&1 | Tee-Object -FilePath .ci-results\install.log
          $exitCode = $LASTEXITCODE
          "exit_code=$exitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Publish install result branch
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $resultDir = Join-Path $env:RUNNER_TEMP "windows-install-result"
          if (Test-Path -LiteralPath $resultDir) {
            Remove-Item -LiteralPath $resultDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $resultDir | Out-Null

          $logPath = Join-Path $resultDir "install.log"
          if (Test-Path -LiteralPath ".ci-results\install.log") {
            Copy-Item -LiteralPath ".ci-results\install.log" -Destination $logPath
          } else {
            "install.log was not produced" | Set-Content -LiteralPath $logPath
          }

          $statusPath = Join-Path $resultDir "status.txt"
          @(
            "source_commit=${{ github.sha }}",
            "runner=${{ matrix.runner }}",
            "job_status=${{ job.status }}",
            "install_outcome=${{ steps.install.outcome }}",
            "install_exit_code=${{ steps.install.outputs.exit_code }}",
            "run_id=${{ github.run_id }}",
            "run_attempt=${{ github.run_attempt }}"
          ) | Set-Content -LiteralPath $statusPath

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan "ci/windows-install-${{ matrix.runner }}"
          git rm -rf . | Out-Null
          New-Item -ItemType Directory -Path ".ci-results\windows-install\${{ matrix.runner }}" -Force | Out-Null
          Copy-Item -LiteralPath $statusPath -Destination ".ci-results\windows-install\${{ matrix.runner }}\status.txt"
          Copy-Item -LiteralPath $logPath -Destination ".ci-results\windows-install\${{ matrix.runner }}\install.log"
          git add ".ci-results/windows-install/${{ matrix.runner }}/status.txt" ".ci-results/windows-install/${{ matrix.runner }}/install.log"
          git commit -m "Record Windows install result for ${{ matrix.runner }}"
          git push --force origin "HEAD:refs/heads/ci/windows-install-${{ matrix.runner }}"

      - name: Fail if install failed
        if: steps.install.outcome != 'success'
        shell: pwsh
        run: exit 1
