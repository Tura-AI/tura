name: Desktop Quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  desktop-quality:
    name: Tauri desktop checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install GUI dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/gui

      - name: Build GUI dist for Tauri
        run: bun run build
        working-directory: apps/gui

      - name: Run Tauri Rust tests
        run: cargo test -p src-tauri
