name: Frontend Quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  tui-quality:
    name: TUI TypeScript checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/tui/package-lock.json

      - name: Install TUI dependencies
        run: npm ci
        working-directory: apps/tui

      - name: Run TUI checks
        run: npm run check
        working-directory: apps/tui

  gui-quality:
    name: GUI TypeScript checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install GUI dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/gui

      - name: Run GUI checks
        run: bun run check
        working-directory: apps/gui
