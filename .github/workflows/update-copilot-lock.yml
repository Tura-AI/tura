name: Update Copilot lockfile

on:
  push:
    branches:
      - feat/github-copilot-sdk-runtime
    paths:
      - .github/workflows/update-copilot-lock.yml

permissions:
  contents: write

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/github-copilot-sdk-runtime

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Generate and validate lockfile
        run: |
          cargo check -p provider
          cargo fmt --all -- --check

      - name: Commit generated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/update-copilot-lock.yml
          git add Cargo.lock
          git commit -m "Update lockfile for Copilot SDK"
          git push origin HEAD:feat/github-copilot-sdk-runtime
