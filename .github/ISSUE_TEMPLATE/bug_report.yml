name: Bug report
description: Report a reproducible Tura defect or regression.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities or include credentials, private session content, or provider tokens. Use SECURITY.md for private reporting.
  - type: input
    id: version
    attributes:
      label: Tura version or commit
      placeholder: 0.1.30 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options:
        - Source installer
        - npm package
        - Release archive
        - Development build
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS, architecture, and shell
      placeholder: Ubuntu 24.04 x64, bash 5.2
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Provider and model
      description: Leave blank when unrelated. Never include a key or token.
      placeholder: anthropic / model-name
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Give exact commands and the smallest deterministic sequence.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or artifacts
      description: Redact credentials, paths containing personal data, prompts, and session content.
      render: shell
  - type: dropdown
    id: regression
    attributes:
      label: Regression status
      options:
        - Worked in an earlier version
        - Never worked
        - Unknown
    validations:
      required: true
  - type: input
    id: last_working
    attributes:
      label: Last known working version or commit
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and found no duplicate.
          required: true
        - label: I can reproduce this on the version or commit listed above.
          required: true
        - label: I removed credentials and private session data.
          required: true
