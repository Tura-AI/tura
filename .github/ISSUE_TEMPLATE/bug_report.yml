name: Bug report
description: Report a reproducible defect or regression.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this form for incorrect behavior. Do not report vulnerabilities or include credentials, private session content, or provider tokens; follow SECURITY.md instead.
  - type: input
    id: version
    attributes:
      label: Tura version or commit
      placeholder: 0.1.30 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected surface
      options:
        - Runtime or state management
        - Session DB or persistence
        - Gateway or CLI
        - TUI
        - GUI or Tauri
        - Source installation or PATH
        - npm package or release
        - Provider compatibility
        - Documentation or example
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Relevant environment
      description: Include only affected OS, architecture, shell, surface, or provider/model. Leave unrelated dimensions out.
      placeholder: Windows 11 x64, PowerShell 7; GUI; Anthropic protocol
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Give the smallest deterministic sequence. Redact private data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      options:
        - Every time
        - Intermittent but repeatable
        - Rare or timing-dependent
        - Occurred once
        - Unknown
    validations:
      required: true
  - type: input
    id: last_working
    attributes:
      label: Last known working version
      description: Leave blank if unknown or if it never worked.
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Include the smallest useful log, trace, screenshot, or fixture. Remove credentials, headers, session IDs, private paths, prompts, and session content.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and found no duplicate.
          required: true
        - label: I removed credentials and private session data.
          required: true
