[tool.node]
id = "node"
description = "Node.js runtime for Playwright browser workflows and frontend verification."
platforms = ["windows", "linux", "macos"]
verify = "node --version"
timeout_secs = 300
permission = "network"
cache_key = "node"

[tool.node.install.windows]
command = "powershell -NoProfile -ExecutionPolicy Bypass -File scripts/install.ps1 -EnvironmentOnly -SkipCommands -SkipApps -SkipUv"

[tool.node.install.linux]
command = "sh scripts/install.sh --environment-only --skip-commands --skip-apps --skip-uv"

[tool.node.install.macos]
command = "sh scripts/install.sh --environment-only --skip-commands --skip-apps --skip-uv"

[tool.playwright]
id = "playwright"
description = "Playwright Node package for browser automation from command_run shell tasks."
platforms = ["windows", "linux", "macos"]
verify = "bun --cwd scripts/packages/playwright_node run playwright --version"
timeout_secs = 300
permission = "network"
cache_key = "bun-playwright"

[tool.playwright.install.windows]
command = "bun install --cwd scripts/packages/playwright_node"

[tool.playwright.install.linux]
command = "bun install --cwd scripts/packages/playwright_node"

[tool.playwright.install.macos]
command = "bun install --cwd scripts/packages/playwright_node"

[tool.playwright_chromium]
id = "playwright_chromium"
description = "Chromium browser binary used by Playwright screenshot and interaction verification."
platforms = ["windows", "linux", "macos"]
verify = "bun --cwd scripts/packages/playwright_node run verify:chromium"
timeout_secs = 600
permission = "network"
cache_key = "playwright-chromium"

[tool.playwright_chromium.install.windows]
command = "bun --cwd scripts/packages/playwright_node run install:chromium"

[tool.playwright_chromium.install.linux]
command = "bun --cwd scripts/packages/playwright_node run install:chromium"

[tool.playwright_chromium.install.macos]
command = "bun --cwd scripts/packages/playwright_node run install:chromium"
