<svg role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg" width="800" height="1522" viewBox="0 0 800 1522">
  <title id="title">Matched High benchmark comparison</title>
  <desc id="desc">DeepSWE and Rewrite Repo benchmark results for Tura Balanced, Tura Direct, and Codex CLI, all using GPT-5.6-SOL with High reasoning effort.</desc>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .section-title { font-size: 32px; font-weight: 900; fill: #0a0a0a; }
    .description, .summary, .metric-label, .footer { font-size: 12px; font-weight: 700; fill: #474747; }
    .agent { font-size: 19px; font-weight: 900; fill: #0a0a0a; }
    .configuration { font-size: 13px; font-weight: 700; fill: #474747; }
    .value { font-size: 22px; font-weight: 900; fill: #0a0a0a; }
    .divider { stroke: #40e0d0; stroke-width: 1; }
    .column-divider { stroke: #0a0a0a; stroke-opacity: 0.24; stroke-width: 0.5; }
    .track { fill: #dedbd2; }
    .balanced { fill: #009f96; }
    .direct { fill: #df6b35; }
    .codex { fill: #7658a5; }
  </style>

  <rect width="800" height="1522" fill="#f4f1ea"/>

