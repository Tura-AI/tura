<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>20 个字符加载动画建议</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ea;
      --ink: #202124;
      --muted: #64625d;
      --line: #d9d1c1;
      --panel: #fffdf8;
      --accent: #0f7b78;
      --warm: #d06a3b;
      --cool: #355c9a;
      --gold: #b48316;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(208, 106, 59, 0.14), transparent 28rem),
        radial-gradient(circle at 100% 18%, rgba(15, 123, 120, 0.16), transparent 26rem),
        var(--bg);
      color: var(--ink);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 48px;
    }

    header {
      display: grid;
      gap: 10px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 54px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .sub {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      min-height: 164px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.88);
      box-shadow: 0 14px 36px rgba(32, 33, 36, 0.08);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .tag {
      flex: 0 0 auto;
      color: var(--accent);
      border: 1px solid rgba(15, 123, 120, 0.28);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      line-height: 1;
    }

    .loader {
      min-height: 56px;
      display: grid;
      place-items: center;
      font-size: 34px;
      line-height: 1;
      letter-spacing: 0;
      color: var(--cool);
      white-space: nowrap;
    }

    .card:nth-child(4n + 1) .loader {
      color: var(--gold);
    }

    .card:nth-child(4n + 2) .loader {
      color: var(--accent);
    }

    .card:nth-child(4n + 3) .loader {
      color: var(--warm);
    }

    code {
      width: 100%;
      display: block;
      overflow: auto;
      color: #3d3b36;
      background: #f1eadf;
      border-radius: 6px;
      padding: 9px 10px;
      font-size: 13px;
      line-height: 1.45;
      white-space: nowrap;
    }

    @media (max-width: 560px) {
      main {
        width: min(100% - 22px, 1120px);
        padding-top: 26px;
      }

      .card {
        min-height: 146px;
      }

      .loader {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>20 个字符加载动画建议</h1>
      <p class="sub">星星、海浪、月相、点阵、能量条都放在这里了。每张卡片会自动循环，下面的字符序列可以直接拿去用。</p>
    </header>

    <section class="grid" id="grid" aria-label="字符加载动画列表"></section>
  </main>

  <script>
    const suggestions = [
      { name: "星光闪烁", tag: "star", frames: ["✦", "✧", "✶", "✷", "✸", "✹"] },
      { name: "双星切换", tag: "star", frames: ["☆", "★", "☆", "★"] },
      { name: "星尘漂浮", tag: "star", frames: ["⋆｡", "⋆｡°", "⋆｡°✩", "｡°✩", "°✩"] },
      { name: "小星轨道", tag: "star", frames: ["✧   ", " ✧  ", "  ✧ ", "   ✧", "  ✧ ", " ✧  "] },
      { name: "海浪起伏", tag: "wave", frames: ["～", "〜", "〰", "〜"] },
      { name: "水波纹", tag: "wave", frames: ["≈", "≋", "≈", "≋"] },
      { name: "潮汐线", tag: "wave", frames: ["▁▂▃", "▂▃▄", "▃▄▅", "▄▅▆", "▃▄▅", "▂▃▄"] },
      { name: "浪花推进", tag: "wave", frames: ["~·  ", " ~· ", "  ~·", " ~· "] },
      { name: "呼吸点阵", tag: "dot", frames: ["·", "•", "●", "•"] },
      { name: "三点加载", tag: "dot", frames: [".  ", ".. ", "...", " ..", "  ."] },
      { name: "脉冲圆点", tag: "dot", frames: ["○", "◌", "●", "◌"] },
      { name: "光点来回", tag: "dot", frames: ["‹ •  ›", "‹  • ›", "‹   •›", "‹  • ›"] },
      { name: "月相旋转", tag: "moon", frames: ["◐", "◓", "◑", "◒"] },
      { name: "圆环跳动", tag: "circle", frames: ["◜", "◝", "◞", "◟"] },
      { name: "方块旋转", tag: "block", frames: ["▖", "▘", "▝", "▗"] },
      { name: "能量上涨", tag: "bar", frames: ["▁", "▂", "▃", "▄", "▅", "▆", "▇", "█"] },
      { name: "扫描条", tag: "bar", frames: ["▌    ", " ▌   ", "  ▌  ", "   ▌ ", "    ▌"] },
      { name: "终端细点", tag: "braille", frames: ["⠁", "⠂", "⠄", "⠂"] },
      { name: "Braille 旋转", tag: "braille", frames: ["⠋", "⠙", "⠹", "⠸", "⠼", "⠴", "⠦", "⠧", "⠇", "⠏"] },
      { name: "箭头推进", tag: "arrow", frames: ["→    ", " →   ", "  →  ", "   → ", "    →"] }
    ];

    const grid = document.querySelector("#grid");

    suggestions.forEach((item, index) => {
      const card = document.createElement("article");
      card.className = "card";
      card.innerHTML = `
        <div class="top">
          <h2>${String(index + 1).padStart(2, "0")} ${item.name}</h2>
          <span class="tag">${item.tag}</span>
        </div>
        <div class="loader" aria-hidden="true">${item.frames[0]}</div>
        <code>${item.frames.join(" ")}</code>
      `;
      grid.appendChild(card);
    });

    const loaders = [...document.querySelectorAll(".loader")];
    let tick = 0;

    setInterval(() => {
      tick += 1;
      loaders.forEach((loader, index) => {
        const frames = suggestions[index].frames;
        loader.textContent = frames[tick % frames.length];
      });
    }, 180);
  </script>
</body>
</html>
