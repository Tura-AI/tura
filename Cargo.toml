[workspace]
resolver = "2"
members = [
  "agents",
  "apps/tauri/src-tauri",
  "commands/read_media",
  "commands/web_discover",
  "crates/gateway",
  "crates/provider",
  "personas",
  "crates/router",
  "crates/runtime",
  "crates/session_log",
  "crates/tools",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Tura"]
license = "MIT"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
bytes = "1"
chrono = { version = "0.4", features = ["serde"] }
dotenvy = "0.15"
futures = "0.3"
futures-util = "0.3"
fs2 = "0.4"
http = "1"
once_cell = "1"
redis = { version = "0.25", features = ["tokio-comp"] }
regex = "1"
reqwest = { version = "0.12", features = ["json", "stream"] }
r2d2 = "0.8"
r2d2_postgres = "0.18"
postgres = { version = "0.19", features = ["with-serde_json-1"] }
postgresql_embedded = { version = "0.20.2", features = ["blocking"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["full"] }
tower = "0.5"
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }

tura-agents = { path = "agents" }
tura-llm-rust = { path = "crates/provider" }
tura-persona = { path = "personas" }
tura-router = { package = "tura_router", path = "crates/router" }
session_log = { path = "crates/session_log" }
