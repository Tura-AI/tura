[workspace]
resolver = "2"
members = [
  "crates/agents",
  "crates/gateway",
  "crates/provider",
  "crates/router",
  "crates/runtime",
  "crates/tools",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Tura"]
license = "MIT"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
bytes = "1"
chrono = { version = "0.4", features = ["serde"] }
dotenvy = "0.15"
futures = "0.3"
futures-util = "0.3"
http = "1"
once_cell = "1"
redis = { version = "0.25", features = ["tokio-comp"] }
regex = "1"
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["full"] }
tower = "0.5"
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }

tura-agents = { path = "crates/agents" }
tura-llm-rust = { path = "crates/provider" }
